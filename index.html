<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XML → Excel Extractor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap");
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #f5f5f3;
        --surf: #fff;
        --surf2: #f0f0ee;
        --brd: #ddddd9;
        --brdhi: #c0c0bc;
        --blue: #2563eb;
        --txt: #1a1a1a;
        --muted: #8a8a85;
        --red: #dc2626;
        --mono: "IBM Plex Mono", monospace;
        --sans: "IBM Plex Sans", sans-serif;
      }
      body {
        background: var(--bg);
        color: var(--txt);
        font-family: var(--sans);
        font-size: 14px;
        height: 100vh;
        display: grid;
        grid-template-rows: 57px 1fr 41px;
        overflow: hidden;
      }
      header {
        border-bottom: 1px solid var(--brd);
        padding: 0 32px;
        display: flex;
        align-items: center;
        background: var(--surf);
      }
      .logo {
        font-family: var(--mono);
        font-weight: 600;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .logo em {
        color: var(--muted);
        font-style: normal;
      }
      .sub {
        color: var(--muted);
        font-size: 12px;
        font-family: var(--mono);
        margin-left: 16px;
      }
      main {
        display: grid;
        grid-template-columns: 380px 1fr;
        overflow: hidden;
      }
      .lp {
        border-right: 1px solid var(--brd);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .sec {
        border-bottom: 1px solid var(--brd);
        padding: 18px 20px;
        flex-shrink: 0;
      }
      .sec.grow {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        border-bottom: none;
      }
      .lbl {
        font-family: var(--mono);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        margin-bottom: 10px;
      }
      .dz {
        border: 1px dashed var(--brdhi);
        background: var(--surf2);
        border-radius: 4px;
        padding: 22px 16px;
        text-align: center;
        cursor: pointer;
        position: relative;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      .dz:hover,
      .dz.over {
        border-color: var(--blue);
        background: rgba(37, 99, 235, 0.03);
      }
      .dz input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
      }
      .dz-icon {
        font-size: 24px;
      }
      .dz-txt {
        color: var(--muted);
        font-size: 12px;
        margin-top: 6px;
        line-height: 1.5;
      }
      .dz-txt strong {
        display: block;
        color: var(--txt);
        font-size: 13px;
      }
      .fbar {
        display: none;
        align-items: center;
        gap: 10px;
        background: var(--surf2);
        border: 1px solid var(--brd);
        border-radius: 4px;
        padding: 10px 14px;
        font-family: var(--mono);
        font-size: 11px;
        margin-top: 10px;
      }
      .fbar.show {
        display: flex;
      }
      .fdot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--blue);
        flex-shrink: 0;
      }
      .fname {
        color: var(--blue);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }
      .fsize {
        color: var(--muted);
        flex-shrink: 0;
      }
      .pgwrap {
        display: none;
        margin-top: 10px;
      }
      .pgwrap.show {
        display: block;
      }
      .pgtrack {
        height: 2px;
        background: var(--brd);
        border-radius: 1px;
        overflow: hidden;
      }
      .pgfill {
        height: 100%;
        background: var(--blue);
        width: 0;
        transition: width 0.2s;
      }
      .pglbl {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
        margin-top: 5px;
      }
      .tctrl {
        display: flex;
        gap: 5px;
        flex-shrink: 0;
        margin-bottom: 8px;
      }
      .tbtn {
        background: var(--surf2);
        border: 1px solid var(--brd);
        color: var(--muted);
        font-family: var(--mono);
        font-size: 10px;
        padding: 4px 10px;
        border-radius: 3px;
        cursor: pointer;
        transition: all 0.1s;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .tbtn:hover {
        color: var(--txt);
        border-color: var(--brdhi);
      }
      .tbtn.on {
        color: var(--blue);
        border-color: var(--blue);
        background: rgba(37, 99, 235, 0.06);
      }
      .sinp {
        width: 100%;
        background: var(--surf2);
        border: 1px solid var(--brd);
        color: var(--txt);
        font-family: var(--mono);
        font-size: 11px;
        padding: 7px 10px;
        border-radius: 3px;
        outline: none;
        margin-bottom: 8px;
        flex-shrink: 0;
        transition: border-color 0.15s;
      }
      .sinp:focus {
        border-color: var(--blue);
      }
      .sinp::placeholder {
        color: var(--muted);
      }
      .fscroll {
        flex: 1;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--brd) transparent;
      }
      .empty {
        color: var(--muted);
        font-size: 12px;
        text-align: center;
        padding: 32px 16px;
        line-height: 1.8;
        font-family: var(--mono);
      }
      .fi {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 8px;
        border-radius: 3px;
        cursor: pointer;
        transition: background 0.08s;
        user-select: none;
      }
      .fi:hover {
        background: var(--surf2);
      }
      .fi.sel {
        background: rgba(37, 99, 235, 0.06);
      }
      .fck {
        width: 14px;
        height: 14px;
        border: 1px solid var(--brdhi);
        border-radius: 2px;
        flex-shrink: 0;
        position: relative;
        transition: all 0.1s;
      }
      .fi.sel .fck {
        background: var(--blue);
        border-color: var(--blue);
      }
      .fi.sel .fck::after {
        content: "";
        position: absolute;
        left: 3px;
        top: 1px;
        width: 6px;
        height: 9px;
        border: 1.5px solid #fff;
        border-top: none;
        border-left: none;
        transform: rotate(45deg);
      }
      .fp {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .fp .lf {
        color: var(--txt);
      }
      .fp .lf.at {
        color: var(--blue);
      }
      .fc {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--brdhi);
        flex-shrink: 0;
      }
      .rp {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .rh {
        border-bottom: 1px solid var(--brd);
        padding: 0 24px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--surf);
        flex-shrink: 0;
      }
      .rtitle {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .rstats {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
      }
      .rstats b {
        color: var(--blue);
        font-weight: normal;
      }
      .twrap {
        flex: 1;
        overflow: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--brd) transparent;
      }
      .pempty {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 12px;
        gap: 12px;
      }
      .pempty .icon {
        font-size: 36px;
        opacity: 0.25;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-family: var(--mono);
        font-size: 11px;
      }
      thead th {
        position: sticky;
        top: 0;
        background: var(--surf);
        border-bottom: 1px solid var(--brdhi);
        padding: 9px 14px;
        text-align: left;
        font-weight: 600;
        color: var(--txt);
        white-space: nowrap;
        z-index: 10;
      }
      .thx {
        display: inline-block;
        margin-left: 8px;
        color: var(--muted);
        cursor: pointer;
        font-size: 10px;
        font-weight: normal;
      }
      .thx:hover {
        color: var(--red);
      }
      tbody tr {
        border-bottom: 1px solid var(--brd);
      }
      tbody tr:hover {
        background: var(--surf2);
      }
      tbody td {
        padding: 7px 14px;
        max-width: 220px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      tbody td.nil {
        color: var(--brdhi);
      }
      footer {
        border-top: 1px solid var(--brd);
        padding: 0 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--surf);
        flex-shrink: 0;
      }
      .fi2 {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
      }
      .fi2 b {
        color: var(--blue);
        font-weight: normal;
      }
      .ebtn {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--txt);
        color: #fff;
        border: none;
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 8px 20px;
        border-radius: 3px;
        cursor: pointer;
        transition:
          background 0.15s,
          transform 0.1s;
      }
      .ebtn:hover {
        background: #333;
        transform: translateY(-1px);
      }
      .ebtn:active {
        transform: none;
      }
      .ebtn:disabled {
        background: var(--brd);
        color: var(--muted);
        cursor: not-allowed;
        transform: none;
      }
      .toast {
        position: fixed;
        bottom: 56px;
        right: 24px;
        background: var(--surf);
        border: 1px solid var(--brd);
        border-left: 3px solid var(--blue);
        border-radius: 4px;
        padding: 11px 16px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--txt);
        z-index: 999;
        max-width: 320px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        transform: translateX(140%);
        transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .toast.show {
        transform: translateX(0);
      }
      .toast.err {
        border-left-color: var(--red);
      }
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--brd);
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">XML<em> → </em>XLS<em> // </em>Extractor</div>
      <div class="sub">
        Generic field extractor &middot; any depth &middot; any schema
      </div>
    </header>
    <main>
      <div class="lp">
        <div class="sec">
          <div class="lbl">01 / XML Datei</div>
          <div class="dz" id="dz">
            <input type="file" id="fi" accept=".xml,text/xml,application/xml" />
            <div class="dz-icon">&#x2B21;</div>
            <div class="dz-txt">
              <strong>XML hochladen</strong>Drag &amp; Drop oder klicken
            </div>
          </div>
          <div class="fbar" id="fbar">
            <div class="fdot"></div>
            <span class="fname" id="fname"></span>
            <span class="fsize" id="fsize"></span>
          </div>
          <div class="pgwrap" id="pgwrap">
            <div class="pgtrack"><div class="pgfill" id="pgfill"></div></div>
            <div class="pglbl" id="pglbl">Analysiere&hellip;</div>
          </div>
        </div>
        <div class="sec grow">
          <div class="lbl">02 / Felder ausw&auml;hlen</div>
          <div class="tctrl">
            <button class="tbtn" id="btnAll" onclick="doAll()">Alle</button>
            <button class="tbtn" id="btnNone" onclick="doNone()">Keine</button>
            <button class="tbtn" id="btnFlat" onclick="doView('flat')">
              Flat
            </button>
            <button class="tbtn" id="btnSort" onclick="doView('az')">
              A&ndash;Z
            </button>
          </div>
          <input
            class="sinp"
            id="sinp"
            type="text"
            placeholder="Felder filtern&hellip;"
            oninput="doSearch(this.value)"
          />
          <div class="fscroll" id="flist">
            <div class="empty">
              &larr; XML hochladen<br />um Felder zu erkunden
            </div>
          </div>
        </div>
      </div>
      <div class="rp">
        <div class="rh">
          <div class="rtitle">Vorschau</div>
          <div class="rstats" id="rstats">&mdash;</div>
        </div>
        <div class="twrap" id="twrap">
          <div class="pempty">
            <div class="icon">&#x2B21;</div>
            <div>Felder ausw&auml;hlen f&uuml;r Vorschau</div>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <div class="fi2" id="finfo">Kein Dokument geladen</div>
      <button class="ebtn" id="ebtn" disabled onclick="doExport()">
        &darr; Excel exportieren
      </button>
    </footer>
    <div class="toast" id="toast"></div>
    <script>
      // ── STATE ────────────────────────────────────────────────────────────────────
      var fields = []; // [{path,leaf,isAttr,count}]
      var selected = new Set();
      var rows = [];
      var view = "flat";
      var query = "";
      var fileName = "";

      // ── STORAGE (localStorage — simple, synchronous, no async bugs) ──────────────
      var STORE_KEY = "xmlex_v1";

      function saveToStorage() {
        try {
          var data = {
            fields: fields,
            selected: Array.from(selected),
            rows: rows,
            view: view,
            fileName: fileName,
          };
          localStorage.setItem(STORE_KEY, JSON.stringify(data));
        } catch (e) {
          console.warn("save failed", e);
        }
      }

      function loadFromStorage() {
        try {
          var raw = localStorage.getItem(STORE_KEY);
          if (!raw) return false;
          var data = JSON.parse(raw);
          if (!data || !data.rows || data.rows.length === 0) return false;
          fields = data.fields || [];
          selected = new Set(data.selected || []);
          rows = data.rows || [];
          view = data.view || "flat";
          fileName = data.fileName || "";
          return true;
        } catch (e) {
          return false;
        }
      }

      // ── STARTUP ──────────────────────────────────────────────────────────────────
      if (loadFromStorage()) {
        g("fbar").classList.add("show");
        g("fname").textContent = fileName + ".xml";
        g("fsize").textContent = rows.length + " Datensätze (gecacht)";
        setFooter();
        syncBtns();
        renderList();
        renderTable();
        toast(
          "Letzter Stand wiederhergestellt (" + rows.length + " Datensätze)",
        );
      }

      // ── FILE HANDLING ─────────────────────────────────────────────────────────────
      var dzel = g("dz");
      g("fi").addEventListener("change", function (e) {
        if (e.target.files[0]) loadFile(e.target.files[0]);
      });
      dzel.addEventListener("dragover", function (e) {
        e.preventDefault();
        dzel.classList.add("over");
      });
      dzel.addEventListener("dragleave", function () {
        dzel.classList.remove("over");
      });
      dzel.addEventListener("drop", function (e) {
        e.preventDefault();
        dzel.classList.remove("over");
        if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
      });

      function loadFile(file) {
        fileName = file.name.replace(/\.xml$/i, "");
        g("fbar").classList.add("show");
        g("fname").textContent = file.name;
        g("fsize").textContent = fmtB(file.size);
        pg(0, "Lese Datei…");
        var r = new FileReader();
        r.onload = function (e) {
          parseXML(e.target.result);
        };
        r.readAsText(file);
      }

      function fmtB(n) {
        return n < 1024
          ? n + " B"
          : n < 1048576
            ? (n / 1024).toFixed(1) + " KB"
            : (n / 1048576).toFixed(1) + " MB";
      }

      // ── XML PARSER ────────────────────────────────────────────────────────────────
      function tn(el) {
        // Always return uppercase tag name, works for both XML and HTML-parsed docs
        return (el.localName || el.tagName || "").toUpperCase();
      }

      function byTag(parent, tag) {
        // Find children by tag, case-insensitive
        var r = [];
        var all = parent.getElementsByTagName(tag);
        if (all.length) return Array.from(all);
        all = parent.getElementsByTagName(tag.toLowerCase());
        if (all.length) return Array.from(all);
        return r;
      }

      function groupKids(node) {
        var g = {};
        for (var i = 0; i < node.children.length; i++) {
          var t = tn(node.children[i]);
          if (!g[t]) g[t] = [];
          g[t].push(node.children[i]);
        }
        return g;
      }

      function parseXML(text) {
        pg(10, "Parse XML…");

        // Fix bare & not part of XML entities
        text = text.replace(
          /&(?![a-zA-Z][a-zA-Z0-9]*;|#[0-9]+;|#x[0-9a-fA-F]+;)/g,
          "&amp;",
        );

        // Parse: try strict XML, fall back to innerHTML repair
        var root = null;
        try {
          var d = new DOMParser().parseFromString(text, "text/xml");
          if (!d.querySelector("parsererror")) root = d.documentElement;
        } catch (e) {}

        if (!root) {
          try {
            var div = document.createElement("div");
            div.innerHTML = text
              .replace(/<\?xml[^?]*\?>/gi, "")
              .replace(/<!DOCTYPE[^>]*>/gi, "")
              .trim();
            if (div.children.length) root = div.children[0];
          } catch (e) {}
        }

        if (!root) {
          pg(0, "");
          hidePg();
          toast("XML konnte nicht gelesen werden.", true);
          return;
        }

        pg(25, "Erkunde Struktur…");

        // Find row anchor = most repeated element
        var dc = {};
        (function scanD(n, d) {
          if (n.nodeType !== 1) return;
          var k = tn(n) + "@" + d;
          dc[k] = (dc[k] || 0) + 1;
          for (var i = 0; i < n.children.length; i++)
            scanD(n.children[i], d + 1);
        })(root, 0);

        var bestK = "",
          bestN = 0;
        Object.keys(dc).forEach(function (k) {
          if (dc[k] > bestN) {
            bestN = dc[k];
            bestK = k;
          }
        });
        var rowTag = bestK ? bestK.split("@")[0] : tn(root);
        var rowEls = byTag(root, rowTag);

        pg(40, rowEls.length + " Datensätze…");

        // Detect KEY/VALUE patterns (e.g. TYPE+VALUE sibling pairs)
        var kvMap = {};
        function detectKV(node) {
          var gr = groupKids(node);
          Object.keys(gr).forEach(function (tag) {
            var sibs = gr[tag];
            if (sibs.length >= 2 && sibs[0].children.length >= 2) {
              var kTag = tn(sibs[0].children[0]);
              var vTag = tn(sibs[0].children[1]);
              var keys = new Set();
              sibs.forEach(function (s) {
                var el = byTag(s, kTag)[0];
                if (el) keys.add(el.textContent.trim());
              });
              if (keys.size > 1) kvMap[tag] = { k: kTag, v: vTag };
            }
            detectKV(sibs[0]);
          });
        }
        if (rowEls.length) detectKV(rowEls[0]);

        pg(55, "Extrahiere Felder…");

        // Extract flat row objects
        function walkNode(node, path, row) {
          if (node.nodeType !== 1) return;
          var tag = tn(node);
          var cur = path ? path + "/" + tag : tag;
          // attributes
          for (var ai = 0; ai < node.attributes.length; ai++) {
            var a = node.attributes[ai];
            if (a.name.indexOf(":") === -1)
              row[cur + "/@" + a.name.toUpperCase()] = a.value;
          }
          if (node.children.length === 0) {
            row[cur] = node.textContent.trim();
            return;
          }
          var gr = groupKids(node);
          Object.keys(gr).forEach(function (ctag) {
            var sibs = gr[ctag];
            if (sibs.length >= 2 && kvMap[ctag]) {
              var kv = kvMap[ctag];
              sibs.forEach(function (sib) {
                var kEl = byTag(sib, kv.k)[0];
                var vEl = byTag(sib, kv.v)[0];
                if (!kEl) return;
                var keyName = kEl.textContent
                  .trim()
                  .replace(/[\/\\?*\[\]:]/g, "_");
                var col = cur + "/" + ctag + "[" + keyName + "]";
                row[col] = vEl ? vEl.textContent.trim() : "";
                for (var i = 0; i < sib.children.length; i++) {
                  var sc = sib.children[i];
                  var st = tn(sc);
                  if (st !== kv.k && st !== kv.v)
                    walkNode(sc, cur + "/" + ctag + "[" + keyName + "]", row);
                }
              });
            } else if (sibs.length >= 2) {
              sibs.forEach(function (s, i) {
                walkNode(s, cur + "/" + ctag + "[" + (i + 1) + "]", row);
              });
            } else {
              walkNode(sibs[0], cur, row);
            }
          });
        }

        var newRows = [];
        for (var i = 0; i < rowEls.length; i++) {
          var row = {};
          walkNode(rowEls[i], "", row);
          newRows.push(row);
        }

        pg(82, "Baue Feldliste…");

        // Build field list in document order
        var cmap = {},
          omap = {},
          oi = 0;
        newRows.forEach(function (row) {
          Object.keys(row).forEach(function (k) {
            if (omap[k] === undefined) omap[k] = oi++;
            if (row[k] !== "") cmap[k] = (cmap[k] || 0) + 1;
            else if (cmap[k] === undefined) cmap[k] = 0;
          });
        });

        fields = Object.keys(cmap)
          .sort(function (a, b) {
            return (omap[a] || 0) - (omap[b] || 0);
          })
          .map(function (path) {
            var parts = path.split("/");
            var lf = parts[parts.length - 1];
            var isA = lf.charAt(0) === "@";
            return {
              path: path,
              leaf: isA ? lf.slice(1) : lf,
              isAttr: isA,
              count: cmap[path],
            };
          });
        rows = newRows;
        selected = new Set();

        pg(100, "Fertig!");
        setTimeout(hidePg, 700);
        setFooter();
        syncBtns();
        renderList();
        renderTable();
        g("ebtn").disabled = true;
        toast(
          rows.length + " Datensätze, " + fields.length + " Felder erkannt",
        );
        saveToStorage();
      }

      // ── FIELD LIST ────────────────────────────────────────────────────────────────
      function renderList() {
        var el = g("flist");
        if (!fields.length) {
          el.innerHTML =
            '<div class="empty">&larr; XML hochladen<br>um Felder zu erkunden</div>';
          return;
        }
        var list = fields.slice();
        if (query) {
          var q = query.toLowerCase();
          list = list.filter(function (f) {
            return f.path.toLowerCase().indexOf(q) !== -1;
          });
        }
        if (view === "az")
          list.sort(function (a, b) {
            return a.path.localeCompare(b.path);
          });
        if (!list.length) {
          el.innerHTML = '<div class="empty">Keine Treffer</div>';
          return;
        }
        var h = "";
        list.forEach(function (f) {
          var sel = selected.has(f.path);
          var kv = f.path.match(/^(.*?)(\[[^\]]+\].*)$/);
          var pre, lf;
          if (kv) {
            pre = kv[1].replace(/\/$/, "");
            lf = kv[2];
          } else {
            var p = f.path.split("/");
            pre = p.slice(0, -1).join("/");
            lf = p[p.length - 1];
          }
          var lfc = f.isAttr ? "lf at" : "lf";
          var dp = pre
            ? '<span style="color:var(--muted)">' +
              he(pre) +
              '/</span><span class="' +
              lfc +
              '">' +
              he(lf) +
              "</span>"
            : '<span class="' + lfc + '">' + he(lf) + "</span>";
          h +=
            '<div class="fi' +
            (sel ? " sel" : "") +
            '" data-path="' +
            he(f.path) +
            '" onclick="toggle(this)">' +
            '<div class="fck"></div>' +
            '<div class="fp" title="' +
            he(f.path) +
            '">' +
            dp +
            "</div>" +
            '<div class="fc">' +
            f.count +
            "</div>" +
            "</div>";
        });
        el.innerHTML = h;
      }

      function toggle(el) {
        var p = el.getAttribute("data-path");
        if (!p) return;
        if (selected.has(p)) selected.delete(p);
        else selected.add(p);
        g("ebtn").disabled = selected.size === 0;
        syncBtns();
        renderList();
        renderTable();
        saveToStorage();
      }

      function doAll() {
        fields.forEach(function (f) {
          selected.add(f.path);
        });
        g("ebtn").disabled = false;
        syncBtns();
        renderList();
        renderTable();
        saveToStorage();
      }

      function doNone() {
        selected.clear();
        g("ebtn").disabled = true;
        syncBtns();
        renderList();
        renderTable();
        saveToStorage();
      }

      function doView(v) {
        view = v;
        syncBtns();
        renderList();
        saveToStorage();
      }

      function doSearch(q) {
        query = q;
        renderList();
      }

      function syncBtns() {
        var selN = 0;
        fields.forEach(function (f) {
          if (selected.has(f.path)) selN++;
        });
        var allOn = fields.length > 0 && selN === fields.length;
        var noneOn = selN === 0;
        g("btnAll").className = "tbtn" + (allOn ? " on" : "");
        g("btnNone").className = "tbtn" + (noneOn ? " on" : "");
        g("btnFlat").className = "tbtn" + (view === "flat" ? " on" : "");
        g("btnSort").className = "tbtn" + (view === "az" ? " on" : "");
      }

      // ── PREVIEW TABLE ─────────────────────────────────────────────────────────────
      var PLIMIT = 200;
      function renderTable() {
        var wrap = g("twrap");
        var stats = g("rstats");
        if (!selected.size) {
          wrap.innerHTML =
            '<div class="pempty"><div class="icon">&#x2B21;</div><div>Felder auswählen für Vorschau</div></div>';
          stats.innerHTML = "&mdash;";
          return;
        }
        var cols = Array.from(selected);
        var labels = cols.map(plabel);
        var rws = rows.slice(0, PLIMIT);
        var th = "";
        cols.forEach(function (c, i) {
          th +=
            "<th>" +
            he(labels[i]) +
            '<span class="thx" data-path="' +
            he(c) +
            '" onclick="rmCol(this)" title="Entfernen">✕</span></th>';
        });
        var tb = "";
        rws.forEach(function (row) {
          tb += "<tr>";
          cols.forEach(function (c) {
            var v = row[c];
            tb +=
              v !== undefined && v !== ""
                ? '<td title="' + he(v) + '">' + he(v) + "</td>"
                : '<td class="nil">—</td>';
          });
          tb += "</tr>";
        });
        wrap.innerHTML =
          "<table><thead><tr>" +
          th +
          "</tr></thead><tbody>" +
          tb +
          "</tbody></table>";
        stats.innerHTML =
          "<b>" +
          rows.length +
          "</b> Zeilen &middot; <b>" +
          cols.length +
          "</b> Spalten" +
          (rows.length > PLIMIT ? " &middot; Vorschau: " + PLIMIT : "");
      }

      function rmCol(el) {
        var p = el.getAttribute("data-path");
        selected.delete(p);
        g("ebtn").disabled = selected.size === 0;
        syncBtns();
        renderList();
        renderTable();
        saveToStorage();
      }

      // ── EXPORT ────────────────────────────────────────────────────────────────────
      function doExport() {
        if (!selected.size || !rows.length) return;
        var cols = Array.from(selected);
        var labels = cols.map(plabel);
        var data = [labels];
        rows.forEach(function (row) {
          data.push(
            cols.map(function (c) {
              return row[c] !== undefined ? row[c] : "";
            }),
          );
        });
        var ws = XLSX.utils.aoa_to_sheet(data);
        var rng = XLSX.utils.decode_range(ws["!ref"]);
        for (var c = rng.s.c; c <= rng.e.c; c++) {
          var cell = ws[XLSX.utils.encode_cell({ r: 0, c: c })];
          if (cell)
            cell.s = {
              font: { bold: true, name: "Arial", sz: 10 },
              fill: { fgColor: { rgb: "DBEAFE" }, patternType: "solid" },
              alignment: { horizontal: "left" },
            };
        }
        ws["!cols"] = labels.map(function (lbl, ci) {
          var mx = lbl.length;
          rows.forEach(function (row) {
            var v = row[cols[ci]];
            if (v && v.length > mx) mx = v.length;
          });
          return { wch: Math.min(mx + 2, 50) };
        });
        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Extraktion");
        XLSX.writeFile(
          wb,
          (fileName || "export") +
            "_" +
            new Date().toISOString().slice(0, 10) +
            ".xlsx",
        );
        toast(rows.length + " Zeilen exportiert");
      }

      // ── UTILS ─────────────────────────────────────────────────────────────────────
      function g(id) {
        return document.getElementById(id);
      }

      function he(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function plabel(path) {
        var m = path.match(/\[([^\]]+)\](?:\/([^\/]+))?$/);
        if (m) return m[2] ? m[1] + " / " + m[2] : m[1];
        return path.split("/").pop().replace("@", "");
      }

      function pg(pct, lbl) {
        g("pgwrap").classList.add("show");
        g("pgfill").style.width = pct + "%";
        g("pgfill").style.width = pct + "%";
        g("pglbl").textContent = lbl;
      }
      function hidePg() {
        g("pgwrap").classList.remove("show");
      }

      function setFooter() {
        g("finfo").innerHTML =
          "<b>" +
          rows.length +
          "</b> Datensätze &middot; <b>" +
          fields.length +
          "</b> Felder erkannt";
      }

      var _tt;
      function toast(msg, isErr) {
        var el = g("toast");
        el.textContent = msg;
        el.className = "toast show" + (isErr ? " err" : "");
        clearTimeout(_tt);
        _tt = setTimeout(function () {
          el.classList.remove("show");
        }, 3000);
      }
    </script>
  </body>
</html>
