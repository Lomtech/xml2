<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XML → Excel Extractor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap");
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #f5f5f3;
        --surface: #ffffff;
        --surface2: #f0f0ee;
        --border: #ddddd9;
        --border-active: #c0c0bc;
        --accent: #1a1a1a;
        --accent2: #2563eb;
        --text: #1a1a1a;
        --muted: #8a8a85;
        --danger: #dc2626;
        --mono: "IBM Plex Mono", monospace;
        --sans: "IBM Plex Sans", sans-serif;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        font-size: 14px;
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }
      header {
        border-bottom: 1px solid var(--border);
        padding: 18px 32px;
        display: flex;
        align-items: center;
        gap: 16px;
        background: var(--surface);
      }
      .logo {
        font-family: var(--mono);
        font-weight: 600;
        font-size: 13px;
        color: var(--text);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .logo span {
        color: var(--muted);
      }
      .subtitle {
        color: var(--muted);
        font-size: 12px;
        font-family: var(--mono);
      }
      main {
        display: grid;
        grid-template-columns: 380px 1fr;
        height: calc(100vh - 57px - 41px);
        overflow: hidden;
      }
      .left-panel {
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .panel-section {
        border-bottom: 1px solid var(--border);
        padding: 20px;
      }
      .panel-section:last-child {
        border-bottom: none;
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .section-label {
        font-family: var(--mono);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        margin-bottom: 12px;
      }
      .dropzone {
        border: 1px dashed var(--border-active);
        background: var(--surface2);
        border-radius: 4px;
        padding: 28px 20px;
        text-align: center;
        cursor: pointer;
        transition: all 0.15s;
        position: relative;
      }
      .dropzone:hover,
      .dropzone.drag-over {
        border-color: var(--accent2);
        background: rgba(37, 99, 235, 0.03);
      }
      .dropzone input {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
      }
      .dropzone-icon {
        font-size: 28px;
        margin-bottom: 8px;
      }
      .dropzone-text {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
      }
      .dropzone-text strong {
        color: var(--text);
        display: block;
        font-size: 13px;
        margin-bottom: 4px;
      }
      .file-info {
        display: none;
        align-items: center;
        gap: 10px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 12px 14px;
        font-family: var(--mono);
        font-size: 11px;
      }
      .file-info.visible {
        display: flex;
      }
      .file-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent2);
        flex-shrink: 0;
      }
      .file-name {
        color: var(--accent2);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }
      .file-size {
        color: var(--muted);
        flex-shrink: 0;
      }
      .parse-progress {
        display: none;
        margin-top: 10px;
      }
      .parse-progress.visible {
        display: block;
      }
      .progress-bar-track {
        height: 2px;
        background: var(--border);
        border-radius: 1px;
        overflow: hidden;
      }
      .progress-bar-fill {
        height: 100%;
        background: var(--accent2);
        width: 0%;
        transition: width 0.2s;
        border-radius: 1px;
      }
      .progress-text {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
        margin-top: 6px;
      }
      .field-tree-wrap {
        flex: 1;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }
      .empty-state {
        color: var(--muted);
        font-size: 12px;
        text-align: center;
        padding: 32px 16px;
        line-height: 1.8;
        font-family: var(--mono);
      }
      .tree-controls {
        display: flex;
        gap: 6px;
        margin-bottom: 10px;
        flex-shrink: 0;
      }
      .tree-btn {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--muted);
        font-family: var(--mono);
        font-size: 10px;
        padding: 4px 10px;
        border-radius: 3px;
        cursor: pointer;
        transition: all 0.1s;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .tree-btn:hover {
        color: var(--text);
        border-color: var(--border-active);
      }
      .tree-btn.active {
        color: var(--accent2);
        border-color: var(--accent2);
        background: rgba(37, 99, 235, 0.06);
      }
      .search-field {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: var(--mono);
        font-size: 11px;
        padding: 7px 10px;
        border-radius: 3px;
        outline: none;
        margin-bottom: 10px;
        transition: border-color 0.15s;
      }
      .search-field:focus {
        border-color: var(--accent2);
      }
      .search-field::placeholder {
        color: var(--muted);
      }
      .field-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 8px;
        border-radius: 3px;
        cursor: pointer;
        transition: background 0.1s;
        user-select: none;
      }
      .field-item:hover {
        background: var(--surface2);
      }
      .field-item.selected {
        background: rgba(37, 99, 235, 0.06);
      }
      .field-checkbox {
        width: 14px;
        height: 14px;
        border: 1px solid var(--border-active);
        border-radius: 2px;
        flex-shrink: 0;
        position: relative;
        transition: all 0.1s;
      }
      .field-item.selected .field-checkbox {
        background: var(--accent2);
        border-color: var(--accent2);
      }
      .field-item.selected .field-checkbox::after {
        content: "";
        position: absolute;
        left: 3px;
        top: 1px;
        width: 6px;
        height: 9px;
        border: 1.5px solid #fff;
        border-top: none;
        border-left: none;
        transform: rotate(45deg);
      }
      .field-path {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .field-path .leaf {
        color: var(--text);
      }
      .field-path .leaf.attr {
        color: var(--accent2);
      }
      .field-count {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--border-active);
        flex-shrink: 0;
      }
      .right-panel {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .right-header {
        border-bottom: 1px solid var(--border);
        padding: 16px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
        background: var(--surface);
      }
      .preview-title {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .preview-stats {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
      }
      .preview-stats span {
        color: var(--accent2);
      }
      .table-wrap {
        flex: 1;
        overflow: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }
      .preview-empty {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 12px;
        gap: 12px;
      }
      .preview-empty .big-icon {
        font-size: 40px;
        opacity: 0.3;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-family: var(--mono);
        font-size: 11px;
      }
      thead th {
        position: sticky;
        top: 0;
        background: var(--surface);
        border-bottom: 1px solid var(--border-active);
        padding: 10px 14px;
        text-align: left;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
        letter-spacing: 0.04em;
        z-index: 10;
      }
      thead th .th-remove {
        display: inline-block;
        margin-left: 8px;
        color: var(--muted);
        cursor: pointer;
        font-size: 10px;
        transition: color 0.1s;
      }
      thead th .th-remove:hover {
        color: var(--danger);
      }
      tbody tr {
        border-bottom: 1px solid var(--border);
        transition: background 0.08s;
      }
      tbody tr:hover {
        background: var(--surface2);
      }
      tbody td {
        padding: 8px 14px;
        color: var(--text);
        max-width: 240px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      tbody td.empty {
        color: var(--border-active);
      }
      footer {
        border-top: 1px solid var(--border);
        padding: 10px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--surface);
        flex-shrink: 0;
      }
      .footer-info {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
      }
      .footer-info span {
        color: var(--accent2);
      }
      .export-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--text);
        color: #fff;
        border: none;
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 9px 22px;
        border-radius: 3px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .export-btn:hover {
        background: #333;
        transform: translateY(-1px);
      }
      .export-btn:active {
        transform: translateY(0);
      }
      .export-btn:disabled {
        background: var(--border);
        color: var(--muted);
        cursor: not-allowed;
        transform: none;
      }
      .toast {
        position: fixed;
        bottom: 60px;
        right: 24px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent2);
        border-radius: 4px;
        padding: 12px 16px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text);
        z-index: 100;
        transform: translateX(120%);
        transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        max-width: 300px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      }
      .toast.show {
        transform: translateX(0);
      }
      .toast.error {
        border-left-color: var(--danger);
      }
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <div class="logo">XML<span> → </span>XLS<span> //</span> Extractor</div>
        <div class="subtitle">
          Generic field extractor · any depth · any schema
        </div>
      </div>
    </header>

    <main>
      <div class="left-panel">
        <div class="panel-section">
          <div class="section-label">01 / XML Datei</div>
          <div class="dropzone" id="dropzone">
            <input
              type="file"
              id="fileInput"
              accept=".xml,text/xml,application/xml"
            />
            <div class="dropzone-icon">⬡</div>
            <div class="dropzone-text">
              <strong>XML hochladen</strong>Drag &amp; Drop oder klicken
            </div>
          </div>
          <div class="file-info" id="fileInfo">
            <div class="file-dot"></div>
            <span class="file-name" id="fileName"></span>
            <span class="file-size" id="fileSize"></span>
          </div>
          <div class="parse-progress" id="parseProgress">
            <div class="progress-bar-track">
              <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Analysiere…</div>
          </div>
        </div>
        <div class="panel-section">
          <div class="section-label">02 / Felder auswählen</div>
          <div class="tree-controls">
            <button class="tree-btn" onclick="selectAll()">Alle</button>
            <button class="tree-btn" onclick="selectNone()">Keine</button>
            <button
              class="tree-btn active"
              id="btnFlat"
              onclick="setView('flat')"
            >
              Flat
            </button>
            <button class="tree-btn" id="btnSorted" onclick="setView('sorted')">
              A–Z
            </button>
          </div>
          <input
            class="search-field"
            id="searchField"
            type="text"
            placeholder="Felder filtern…"
            oninput="filterFields(this.value)"
          />
          <div class="field-tree-wrap" id="fieldTree">
            <div class="empty-state">
              ← XML hochladen<br />um Felder zu erkunden
            </div>
          </div>
        </div>
      </div>

      <div class="right-panel">
        <div class="right-header">
          <div class="preview-title">Vorschau</div>
          <div class="preview-stats" id="previewStats">—</div>
        </div>
        <div class="table-wrap" id="tableWrap">
          <div class="preview-empty">
            <div class="big-icon">⬡</div>
            <div>Felder auswählen für Vorschau</div>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <div class="footer-info" id="footerInfo">Kein Dokument geladen</div>
      <button
        class="export-btn"
        id="exportBtn"
        disabled
        onclick="exportExcel()"
      >
        <span>↓</span> Excel exportieren
      </button>
    </footer>

    <div class="toast" id="toast"></div>

    <script>
      // ─── STATE ───────────────────────────────────────────────────────────────────
      var allFields = [];
      var selectedFields = new Set();
      var parsedRows = [];
      var currentView = "flat";
      var filterQuery = "";
      var xmlFileName = "";
      var totalNodes = 0;

      // ─── INDEXEDDB ────────────────────────────────────────────────────────────────
      var DB_NAME = "xml_extractor_v2";

      function openDB() {
        return new Promise(function (resolve, reject) {
          var req = indexedDB.open(DB_NAME, 1);
          req.onupgradeneeded = function (e) {
            e.target.result.createObjectStore("s");
          };
          req.onsuccess = function (e) {
            resolve(e.target.result);
          };
          req.onerror = function () {
            reject(req.error);
          };
        });
      }

      function dbPut(key, value) {
        return openDB()
          .then(function (db) {
            return new Promise(function (resolve, reject) {
              var tx = db.transaction("s", "readwrite");
              tx.objectStore("s").put(value, key);
              tx.oncomplete = resolve;
              tx.onerror = function () {
                reject(tx.error);
              };
            });
          })
          .catch(function (e) {
            console.warn("dbPut:", e);
          });
      }

      function dbGet(key) {
        return openDB()
          .then(function (db) {
            return new Promise(function (resolve, reject) {
              var tx = db.transaction("s", "readonly");
              var req = tx.objectStore("s").get(key);
              req.onsuccess = function () {
                resolve(req.result);
              };
              req.onerror = function () {
                reject(req.error);
              };
            });
          })
          .catch(function () {
            return null;
          });
      }

      function saveSession() {
        dbPut("session", {
          allFields: allFields,
          selectedFields: Array.from(selectedFields),
          parsedRows: parsedRows,
          xmlFileName: xmlFileName,
          totalNodes: totalNodes,
          currentView: currentView,
          ts: Date.now(),
        });
      }

      // ─── STARTUP: restore session ─────────────────────────────────────────────────
      dbGet("session").then(function (s) {
        if (!s || !s.parsedRows || s.parsedRows.length === 0) return;
        allFields = s.allFields || [];
        selectedFields = new Set(s.selectedFields || []);
        parsedRows = s.parsedRows || [];
        xmlFileName = s.xmlFileName || "";
        totalNodes = s.totalNodes || 0;
        currentView = s.currentView || "flat";

        document.getElementById("fileInfo").classList.add("visible");
        document.getElementById("fileName").textContent = xmlFileName + ".xml";
        document.getElementById("fileSize").textContent =
          totalNodes + " Datensätze (gecacht)";
        document.getElementById("footerInfo").innerHTML =
          "<span>" +
          totalNodes +
          "</span> Datensätze · <span>" +
          allFields.length +
          "</span> Felder erkannt";
        document
          .getElementById("btnFlat")
          .classList.toggle("active", currentView === "flat");
        document
          .getElementById("btnSorted")
          .classList.toggle("active", currentView === "sorted");
        document.getElementById("exportBtn").disabled =
          selectedFields.size === 0;
        renderFieldTree();
        renderTable();
        showToast("Letzter Stand wiederhergestellt");
      });

      // ─── FILE HANDLING ────────────────────────────────────────────────────────────
      var dropzone = document.getElementById("dropzone");
      var fileInput = document.getElementById("fileInput");

      dropzone.addEventListener("dragover", function (e) {
        e.preventDefault();
        dropzone.classList.add("drag-over");
      });
      dropzone.addEventListener("dragleave", function () {
        dropzone.classList.remove("drag-over");
      });
      dropzone.addEventListener("drop", function (e) {
        e.preventDefault();
        dropzone.classList.remove("drag-over");
        if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
      });
      fileInput.addEventListener("change", function (e) {
        if (e.target.files[0]) handleFile(e.target.files[0]);
      });

      function handleFile(file) {
        xmlFileName = file.name.replace(/\.xml$/i, "");
        document.getElementById("fileName").textContent = file.name;
        document.getElementById("fileSize").textContent = formatBytes(
          file.size,
        );
        document.getElementById("fileInfo").classList.add("visible");
        document.getElementById("parseProgress").classList.add("visible");
        setProgress(0, "Lese Datei…");
        var reader = new FileReader();
        reader.onload = function (e) {
          parseXML(e.target.result);
        };
        reader.readAsText(file);
      }

      function formatBytes(b) {
        if (b < 1024) return b + " B";
        if (b < 1048576) return (b / 1024).toFixed(1) + " KB";
        return (b / 1048576).toFixed(1) + " MB";
      }

      // ─── XML PARSER ──────────────────────────────────────────────────────────────

      function detectKVPattern(elements) {
        if (!elements || elements.length < 2) return null;
        var first = elements[0];
        if (first.children.length < 2) return null;
        var keyTag = first.children[0].localName;
        var valueTag = first.children[1].localName;
        var keys = [];
        for (var i = 0; i < elements.length; i++) {
          var k = elements[i].getElementsByTagNameNS("*", keyTag)[0];
          if (k) keys.push(k.textContent.trim());
        }
        var unique = new Set(keys.filter(Boolean));
        return unique.size > 1 ? { keyTag: keyTag, valueTag: valueTag } : null;
      }

      function findKVContainers(node, kvPatterns) {
        if (node.nodeType !== 1) return;
        var byTag = {};
        for (var i = 0; i < node.children.length; i++) {
          var t = node.children[i].localName;
          if (!byTag[t]) byTag[t] = [];
          byTag[t].push(node.children[i]);
        }
        var tags = Object.keys(byTag);
        for (var ti = 0; ti < tags.length; ti++) {
          var tag = tags[ti];
          var siblings = byTag[tag];
          if (siblings.length >= 2) {
            var kv = detectKVPattern(siblings);
            if (kv) kvPatterns[tag] = kv;
          }
          findKVContainers(siblings[0], kvPatterns);
        }
      }

      function buildExtractRow(kvPatterns) {
        return function extractRow(rowEl) {
          var row = {};
          function walk(node, path) {
            if (node.nodeType !== 1) return;
            var tag = node.localName.toUpperCase();
            var currPath = path ? path + "/" + tag : tag;

            for (var ai = 0; ai < node.attributes.length; ai++) {
              var attr = node.attributes[ai];
              if (attr.name.indexOf(":") === -1) {
                row[currPath + "/@" + attr.name.toUpperCase()] = attr.value;
              }
            }

            if (node.children.length === 0) {
              row[currPath] = node.textContent.trim();
              return;
            }

            var byTag = {};
            for (var ci = 0; ci < node.children.length; ci++) {
              var ct = node.children[ci].localName;
              if (!byTag[ct]) byTag[ct] = [];
              byTag[ct].push(node.children[ci]);
            }

            var childTags = Object.keys(byTag);
            for (var cti = 0; cti < childTags.length; cti++) {
              var childTag = childTags[cti];
              var siblings = byTag[childTag];

              if (siblings.length >= 2 && kvPatterns[childTag]) {
                var kv = kvPatterns[childTag];
                for (var si = 0; si < siblings.length; si++) {
                  var sib = siblings[si];
                  var keyEl = sib.getElementsByTagNameNS("*", kv.keyTag)[0];
                  var valEl = sib.getElementsByTagNameNS("*", kv.valueTag)[0];
                  if (keyEl) {
                    var keyName = keyEl.textContent
                      .trim()
                      .replace(/[\/\\?\*\[\]:]/g, "_");
                    var colPath =
                      currPath +
                      "/" +
                      childTag.toUpperCase() +
                      "[" +
                      keyName +
                      "]";
                    row[colPath] = valEl ? valEl.textContent.trim() : "";
                    for (var sci = 0; sci < sib.children.length; sci++) {
                      var subChild = sib.children[sci];
                      var subTag = subChild.localName.toUpperCase();
                      if (
                        subTag !== kv.keyTag.toUpperCase() &&
                        subTag !== kv.valueTag.toUpperCase()
                      ) {
                        walk(
                          subChild,
                          currPath +
                            "/" +
                            childTag.toUpperCase() +
                            "[" +
                            keyName +
                            "]",
                        );
                      }
                    }
                  }
                }
              } else if (siblings.length >= 2) {
                for (var ri = 0; ri < siblings.length; ri++) {
                  walk(
                    siblings[ri],
                    currPath +
                      "/" +
                      childTag.toUpperCase() +
                      "[" +
                      (ri + 1) +
                      "]",
                  );
                }
              } else {
                walk(siblings[0], currPath);
              }
            }
          }
          walk(rowEl, "");
          return row;
        };
      }

      function parseXML(xmlText) {
        setProgress(10, "Parse XML…");
        var xmlDoc;
        try {
          var parser = new DOMParser();
          xmlDoc = parser.parseFromString(xmlText, "text/xml");
          var errEl = xmlDoc.querySelector("parsererror");
          if (errEl)
            throw new Error("XML-Fehler: " + errEl.textContent.slice(0, 100));
        } catch (ex) {
          showToast(ex.message, true);
          document.getElementById("parseProgress").classList.remove("visible");
          return;
        }

        setProgress(25, "Erkunde Struktur…");

        // Pass 1: row-anchor = most repeated element
        var tagDepthCount = {};
        function scanDepths(node, depth) {
          if (node.nodeType !== 1) return;
          var k = node.localName + "@" + depth;
          tagDepthCount[k] = (tagDepthCount[k] || 0) + 1;
          for (var i = 0; i < node.children.length; i++)
            scanDepths(node.children[i], depth + 1);
        }
        scanDepths(xmlDoc.documentElement, 0);

        var bestKey = null,
          bestCount = 0;
        var depthKeys = Object.keys(tagDepthCount);
        for (var dki = 0; dki < depthKeys.length; dki++) {
          if (tagDepthCount[depthKeys[dki]] > bestCount) {
            bestCount = tagDepthCount[depthKeys[dki]];
            bestKey = depthKeys[dki];
          }
        }
        var rowTag = bestKey
          ? bestKey.split("@")[0]
          : xmlDoc.documentElement.localName;
        var rowElements = Array.from(
          xmlDoc.getElementsByTagNameNS("*", rowTag),
        );
        setProgress(40, rowElements.length + " Datensätze gefunden…");

        // Pass 2: KV pattern detection
        var kvPatterns = {};
        if (rowElements.length > 0)
          findKVContainers(rowElements[0], kvPatterns);

        setProgress(55, "Extrahiere Felder…");

        // Pass 3: extract rows
        var extractRow = buildExtractRow(kvPatterns);
        var rowData = [];
        for (var ri = 0; ri < rowElements.length; ri++) {
          rowData.push(extractRow(rowElements[ri]));
        }

        setProgress(80, "Baue Feldliste…");

        // Build field registry in document order
        var fieldCountMap = {};
        var fieldOrderMap = {};
        var orderIdx = 0;
        for (var rowi = 0; rowi < rowData.length; rowi++) {
          var rowKeys = Object.keys(rowData[rowi]);
          for (var rki = 0; rki < rowKeys.length; rki++) {
            var rk = rowKeys[rki];
            if (fieldOrderMap[rk] === undefined) fieldOrderMap[rk] = orderIdx++;
            if (rowData[rowi][rk] !== "") {
              fieldCountMap[rk] = (fieldCountMap[rk] || 0) + 1;
            } else if (fieldCountMap[rk] === undefined) {
              fieldCountMap[rk] = 0;
            }
          }
        }

        allFields = Object.keys(fieldCountMap)
          .sort(function (a, b) {
            return (fieldOrderMap[a] || 0) - (fieldOrderMap[b] || 0);
          })
          .map(function (path) {
            var parts = path.split("/");
            var leaf = parts[parts.length - 1];
            var isAttr = leaf.charAt(0) === "@";
            return {
              path: path,
              leafName: isAttr ? leaf.slice(1) : leaf,
              isAttr: isAttr,
              count: fieldCountMap[path],
            };
          });

        parsedRows = rowData;
        totalNodes = rowData.length;

        setProgress(100, "Fertig!");
        setTimeout(function () {
          document.getElementById("parseProgress").classList.remove("visible");
        }, 600);

        document.getElementById("footerInfo").innerHTML =
          "<span>" +
          totalNodes +
          "</span> Datensätze · <span>" +
          allFields.length +
          "</span> Felder erkannt";

        selectedFields.clear();
        document.getElementById("exportBtn").disabled = true;
        renderFieldTree();
        renderTable();
        showToast(totalNodes + " Datensätze, " + allFields.length + " Felder");
        saveSession();
      }

      // ─── FIELD TREE ──────────────────────────────────────────────────────────────
      function renderFieldTree() {
        var container = document.getElementById("fieldTree");
        if (allFields.length === 0) {
          container.innerHTML =
            '<div class="empty-state">← XML hochladen<br>um Felder zu erkunden</div>';
          return;
        }

        var fields = allFields.slice();

        if (filterQuery) {
          var q = filterQuery.toLowerCase();
          fields = fields.filter(function (f) {
            return (
              f.path.toLowerCase().indexOf(q) !== -1 ||
              f.leafName.toLowerCase().indexOf(q) !== -1
            );
          });
        }

        if (currentView === "sorted") {
          fields.sort(function (a, b) {
            return a.path.localeCompare(b.path);
          });
        }

        var html = "";
        for (var fi = 0; fi < fields.length; fi++) {
          var f = fields[fi];
          var sel = selectedFields.has(f.path);
          var kvMatch = f.path.match(/^(.*?)(\[[^\]]+\].*)$/);
          var prefixDisplay, leafDisplay;
          if (kvMatch) {
            prefixDisplay = kvMatch[1].replace(/\/$/, "");
            leafDisplay = kvMatch[2];
          } else {
            var parts = f.path.split("/");
            prefixDisplay = parts.slice(0, -1).join("/");
            leafDisplay = parts[parts.length - 1];
          }
          var leafClass = f.isAttr ? "leaf attr" : "leaf";
          var pathDisplay = prefixDisplay
            ? '<span style="color:var(--muted)">' +
              esc(prefixDisplay) +
              '/</span><span class="' +
              leafClass +
              '">' +
              esc(leafDisplay) +
              "</span>"
            : '<span class="' + leafClass + '">' + esc(leafDisplay) + "</span>";

          var safeOnclick =
            "toggleField('" +
            f.path.replace(/\\/g, "\\\\").replace(/'/g, "\\'") +
            "')";
          html +=
            '<div class="field-item' +
            (sel ? " selected" : "") +
            '" onclick="' +
            esc(safeOnclick) +
            '">' +
            '<div class="field-checkbox"></div>' +
            '<div class="field-path" title="' +
            esc(f.path) +
            '">' +
            pathDisplay +
            "</div>" +
            '<div class="field-count">' +
            f.count +
            "</div>" +
            "</div>";
        }

        container.innerHTML =
          html || '<div class="empty-state">Keine Treffer</div>';
      }

      function toggleField(path) {
        if (selectedFields.has(path)) selectedFields.delete(path);
        else selectedFields.add(path);
        renderFieldTree();
        renderTable();
        document.getElementById("exportBtn").disabled =
          selectedFields.size === 0;
        saveSession();
      }

      function selectAll() {
        for (var i = 0; i < allFields.length; i++)
          selectedFields.add(allFields[i].path);
        renderFieldTree();
        renderTable();
        document.getElementById("exportBtn").disabled =
          selectedFields.size === 0;
        saveSession();
      }

      function selectNone() {
        selectedFields.clear();
        renderFieldTree();
        renderTable();
        document.getElementById("exportBtn").disabled = true;
        saveSession();
      }

      function setView(v) {
        currentView = v;
        document
          .getElementById("btnFlat")
          .classList.toggle("active", v === "flat");
        document
          .getElementById("btnSorted")
          .classList.toggle("active", v === "sorted");
        renderFieldTree();
        saveSession();
      }

      function filterFields(q) {
        filterQuery = q;
        renderFieldTree();
      }

      // ─── PREVIEW TABLE ───────────────────────────────────────────────────────────
      var PREVIEW_LIMIT = 200;

      function renderTable() {
        var container = document.getElementById("tableWrap");
        var stats = document.getElementById("previewStats");

        if (selectedFields.size === 0) {
          container.innerHTML =
            '<div class="preview-empty"><div class="big-icon">⬡</div><div>Felder auswählen für Vorschau</div></div>';
          stats.textContent = "—";
          return;
        }

        var cols = Array.from(selectedFields);
        var rows = parsedRows.slice(0, PREVIEW_LIMIT);
        var colLabels = cols.map(function (c) {
          return pathToLabel(c);
        });

        var headerCells = "";
        for (var ci = 0; ci < cols.length; ci++) {
          var safeOnclick =
            "toggleField('" +
            cols[ci].replace(/\\/g, "\\\\").replace(/'/g, "\\'") +
            "')";
          headerCells +=
            "<th>" +
            esc(colLabels[ci]) +
            '<span class="th-remove" onclick="' +
            esc(safeOnclick) +
            '" title="Spalte entfernen">✕</span></th>';
        }

        var bodyRows = "";
        for (var ri = 0; ri < rows.length; ri++) {
          var cells = "";
          for (var rci = 0; rci < cols.length; rci++) {
            var val = rows[ri][cols[rci]];
            cells +=
              val !== undefined && val !== ""
                ? '<td title="' + esc(val) + '">' + esc(val) + "</td>"
                : '<td class="empty">—</td>';
          }
          bodyRows += "<tr>" + cells + "</tr>";
        }

        container.innerHTML =
          "<table><thead><tr>" +
          headerCells +
          "</tr></thead><tbody>" +
          bodyRows +
          "</tbody></table>";

        var total = parsedRows.length;
        stats.innerHTML =
          "<span>" +
          total +
          "</span> Zeilen · <span>" +
          cols.length +
          "</span> Spalten" +
          (total > PREVIEW_LIMIT ? " · Vorschau: " + PREVIEW_LIMIT : "");
      }

      // ─── EXCEL EXPORT ────────────────────────────────────────────────────────────
      function exportExcel() {
        if (selectedFields.size === 0 || parsedRows.length === 0) return;

        var cols = Array.from(selectedFields);
        var colLabels = cols.map(function (c) {
          return pathToLabel(c);
        });
        var sheetData = [colLabels];

        for (var i = 0; i < parsedRows.length; i++) {
          var dataRow = [];
          for (var ci = 0; ci < cols.length; ci++) {
            var v = parsedRows[i][cols[ci]];
            dataRow.push(v !== undefined ? v : "");
          }
          sheetData.push(dataRow);
        }

        var ws = XLSX.utils.aoa_to_sheet(sheetData);
        var range = XLSX.utils.decode_range(ws["!ref"]);
        for (var c = range.s.c; c <= range.e.c; c++) {
          var cell = ws[XLSX.utils.encode_cell({ r: 0, c: c })];
          if (cell) {
            cell.s = {
              font: { bold: true, name: "Arial", sz: 10 },
              fill: { fgColor: { rgb: "DBEAFE" }, patternType: "solid" },
              alignment: { horizontal: "left" },
            };
          }
        }

        var colWidths = colLabels.map(function (label, ci) {
          var max = label.length;
          for (var ri = 0; ri < parsedRows.length; ri++) {
            var v = parsedRows[ri][cols[ci]];
            if (v && v.length > max) max = v.length;
          }
          return { wch: Math.min(max + 2, 45) };
        });
        ws["!cols"] = colWidths;

        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Extraktion");
        var fname =
          (xmlFileName || "export") +
          "_" +
          new Date().toISOString().slice(0, 10) +
          ".xlsx";
        XLSX.writeFile(wb, fname);
        showToast(parsedRows.length + " Zeilen exportiert");
      }

      // ─── UTILS ───────────────────────────────────────────────────────────────────
      function setProgress(pct, text) {
        document.getElementById("progressFill").style.width = pct + "%";
        document.getElementById("progressText").textContent = text;
      }

      function pathToLabel(path) {
        var kvMatch = path.match(/\[([^\]]+)\](?:\/([^\/]+))?$/);
        if (kvMatch)
          return kvMatch[2] ? kvMatch[1] + " / " + kvMatch[2] : kvMatch[1];
        return path.split("/").pop().replace("@", "");
      }

      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      var toastTimer;
      function showToast(msg, isError) {
        var t = document.getElementById("toast");
        t.textContent = msg;
        t.className = "toast show" + (isError ? " error" : "");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function () {
          t.classList.remove("show");
        }, 2800);
      }
    </script>
  </body>
</html>
