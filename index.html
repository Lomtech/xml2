<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XML → Excel Extractor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap");
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #f5f5f3;
        --surf: #fff;
        --surf2: #f0f0ee;
        --brd: #ddddd9;
        --brdhi: #c0c0bc;
        --blue: #2563eb;
        --txt: #1a1a1a;
        --muted: #8a8a85;
        --red: #dc2626;
        --mono: "IBM Plex Mono", monospace;
        --sans: "IBM Plex Sans", sans-serif;
      }
      body {
        background: var(--bg);
        color: var(--txt);
        font-family: var(--sans);
        font-size: 14px;
        height: 100vh;
        overflow: hidden;
        display: grid;
        grid-template-rows: 57px 1fr 41px;
      }
      header {
        border-bottom: 1px solid var(--brd);
        padding: 0 32px;
        display: flex;
        align-items: center;
        background: var(--surf);
      }
      .logo {
        font-family: var(--mono);
        font-weight: 600;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .logo em {
        color: var(--muted);
        font-style: normal;
      }
      .sub {
        color: var(--muted);
        font-size: 12px;
        font-family: var(--mono);
        margin-left: 16px;
      }
      main {
        display: grid;
        grid-template-columns: 380px 1fr;
        overflow: hidden;
      }
      .lp {
        border-right: 1px solid var(--brd);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .sec {
        border-bottom: 1px solid var(--brd);
        padding: 18px 20px;
        flex-shrink: 0;
      }
      .sec.grow {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        border-bottom: none;
      }
      .lbl {
        font-family: var(--mono);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        margin-bottom: 10px;
      }
      .dz {
        border: 1px dashed var(--brdhi);
        background: var(--surf2);
        border-radius: 4px;
        padding: 22px 16px;
        text-align: center;
        cursor: pointer;
        position: relative;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      .dz:hover,
      .dz.over {
        border-color: var(--blue);
        background: rgba(37, 99, 235, 0.03);
      }
      .dz input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
      }
      .dz-icon {
        font-size: 24px;
      }
      .dz-txt {
        color: var(--muted);
        font-size: 12px;
        margin-top: 6px;
        line-height: 1.5;
      }
      .dz-txt strong {
        display: block;
        color: var(--txt);
        font-size: 13px;
      }
      .fbar {
        display: none;
        align-items: center;
        gap: 10px;
        background: var(--surf2);
        border: 1px solid var(--brd);
        border-radius: 4px;
        padding: 10px 14px;
        font-family: var(--mono);
        font-size: 11px;
        margin-top: 10px;
      }
      .fbar.show {
        display: flex;
      }
      .fdot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--blue);
        flex-shrink: 0;
      }
      .fname {
        color: var(--blue);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }
      .fsize {
        color: var(--muted);
        flex-shrink: 0;
      }
      .pgwrap {
        display: none;
        margin-top: 10px;
      }
      .pgwrap.show {
        display: block;
      }
      .pgtrack {
        height: 2px;
        background: var(--brd);
        border-radius: 1px;
        overflow: hidden;
      }
      .pgfill {
        height: 100%;
        background: var(--blue);
        width: 0;
        transition: width 0.2s;
      }
      .pglbl {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
        margin-top: 5px;
      }
      .tctrl {
        display: flex;
        gap: 5px;
        flex-shrink: 0;
        margin-bottom: 8px;
      }
      .tbtn {
        background: var(--surf2);
        border: 1px solid var(--brd);
        color: var(--muted);
        font-family: var(--mono);
        font-size: 10px;
        padding: 4px 10px;
        border-radius: 3px;
        cursor: pointer;
        transition: all 0.1s;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .tbtn:hover {
        color: var(--txt);
        border-color: var(--brdhi);
      }
      .tbtn.on {
        color: var(--blue);
        border-color: var(--blue);
        background: rgba(37, 99, 235, 0.06);
      }
      .sinp {
        width: 100%;
        background: var(--surf2);
        border: 1px solid var(--brd);
        color: var(--txt);
        font-family: var(--mono);
        font-size: 11px;
        padding: 7px 10px;
        border-radius: 3px;
        outline: none;
        margin-bottom: 8px;
        flex-shrink: 0;
        transition: border-color 0.15s;
      }
      .sinp:focus {
        border-color: var(--blue);
      }
      .sinp::placeholder {
        color: var(--muted);
      }
      .fscroll {
        flex: 1;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--brd) transparent;
      }
      .empty-msg {
        color: var(--muted);
        font-size: 12px;
        text-align: center;
        padding: 32px 16px;
        line-height: 1.8;
        font-family: var(--mono);
      }
      .fi {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 8px;
        border-radius: 3px;
        cursor: pointer;
        transition: background 0.08s;
        user-select: none;
      }
      .fi:hover {
        background: var(--surf2);
      }
      .fi.sel {
        background: rgba(37, 99, 235, 0.06);
      }
      .fck {
        width: 14px;
        height: 14px;
        border: 1px solid var(--brdhi);
        border-radius: 2px;
        flex-shrink: 0;
        position: relative;
        transition: all 0.1s;
      }
      .fi.sel .fck {
        background: var(--blue);
        border-color: var(--blue);
      }
      .fi.sel .fck::after {
        content: "";
        position: absolute;
        left: 3px;
        top: 1px;
        width: 6px;
        height: 9px;
        border: 1.5px solid #fff;
        border-top: none;
        border-left: none;
        transform: rotate(45deg);
      }
      .fp {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .fp .lf {
        color: var(--txt);
      }
      .fp .lf.at {
        color: var(--blue);
      }
      .fc {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--brdhi);
        flex-shrink: 0;
      }
      .rp {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .rh {
        border-bottom: 1px solid var(--brd);
        padding: 0 24px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--surf);
        flex-shrink: 0;
      }
      .rtitle {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .rstats {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
      }
      .rstats b {
        color: var(--blue);
        font-weight: normal;
      }
      .twrap {
        flex: 1;
        overflow: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--brd) transparent;
      }
      .pempty {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 12px;
        gap: 12px;
      }
      .pempty .icon {
        font-size: 36px;
        opacity: 0.25;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-family: var(--mono);
        font-size: 11px;
      }
      thead th {
        position: sticky;
        top: 0;
        background: var(--surf);
        border-bottom: 1px solid var(--brdhi);
        padding: 9px 14px;
        text-align: left;
        font-weight: 600;
        color: var(--txt);
        white-space: nowrap;
        z-index: 10;
      }
      .thx {
        display: inline-block;
        margin-left: 8px;
        color: var(--muted);
        cursor: pointer;
        font-size: 10px;
        font-weight: normal;
      }
      .thx:hover {
        color: var(--red);
      }
      tbody tr {
        border-bottom: 1px solid var(--brd);
      }
      tbody tr:hover {
        background: var(--surf2);
      }
      tbody td {
        padding: 7px 14px;
        max-width: 220px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      tbody td.nil {
        color: var(--brdhi);
      }
      footer {
        border-top: 1px solid var(--brd);
        padding: 0 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--surf);
        flex-shrink: 0;
      }
      .finfo {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
      }
      .finfo b {
        color: var(--blue);
        font-weight: normal;
      }
      .ebtn {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--txt);
        color: #fff;
        border: none;
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 8px 20px;
        border-radius: 3px;
        cursor: pointer;
        transition:
          background 0.15s,
          transform 0.1s;
      }
      .ebtn:hover {
        background: #333;
        transform: translateY(-1px);
      }
      .ebtn:active {
        transform: none;
      }
      .ebtn:disabled {
        background: var(--brd);
        color: var(--muted);
        cursor: not-allowed;
        transform: none;
      }
      .toast {
        position: fixed;
        bottom: 56px;
        right: 24px;
        background: var(--surf);
        border: 1px solid var(--brd);
        border-left: 3px solid var(--blue);
        border-radius: 4px;
        padding: 11px 16px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--txt);
        z-index: 999;
        max-width: 320px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        transform: translateX(140%);
        transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .toast.show {
        transform: translateX(0);
      }
      .toast.err {
        border-left-color: var(--red);
      }
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--brd);
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">XML<em> → </em>XLS<em> // </em>Extractor</div>
      <div class="sub">Generic field extractor · any depth · any schema</div>
    </header>
    <main>
      <div class="lp">
        <div class="sec">
          <div class="lbl">01 / XML Datei</div>
          <div class="dz" id="dz">
            <input type="file" id="fi" accept=".xml,text/xml,application/xml" />
            <div class="dz-icon">⬡</div>
            <div class="dz-txt">
              <strong>XML hochladen</strong>Drag &amp; Drop oder klicken
            </div>
          </div>
          <div class="fbar" id="fbar">
            <div class="fdot"></div>
            <span class="fname" id="fname"></span>
            <span class="fsize" id="fsize"></span>
          </div>
          <div class="pgwrap" id="pgwrap">
            <div class="pgtrack"><div class="pgfill" id="pgfill"></div></div>
            <div class="pglbl" id="pglbl">Analysiere…</div>
          </div>
        </div>
        <div class="sec grow">
          <div class="lbl">02 / Felder auswählen</div>
          <div class="tctrl">
            <button class="tbtn" id="btnAll" onclick="doAll()">Alle</button>
            <button class="tbtn" id="btnNone" onclick="doNone()">Keine</button>
            <button class="tbtn" id="btnFlat" onclick="doView('flat')">
              Flat
            </button>
            <button class="tbtn" id="btnSort" onclick="doView('az')">
              A–Z
            </button>
          </div>
          <input
            class="sinp"
            id="sinp"
            type="text"
            placeholder="Felder filtern…"
            oninput="doSearch(this.value)"
          />
          <div class="fscroll" id="flist">
            <div class="empty-msg">
              ← XML hochladen<br />um Felder zu erkunden
            </div>
          </div>
        </div>
      </div>
      <div class="rp">
        <div class="rh">
          <div class="rtitle">Vorschau</div>
          <div class="rstats" id="rstats">—</div>
        </div>
        <div class="twrap" id="twrap">
          <div class="pempty">
            <div class="icon">⬡</div>
            <div>Felder auswählen für Vorschau</div>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <div class="finfo" id="finfo">Kein Dokument geladen</div>
      <button class="ebtn" id="ebtn" disabled onclick="doExport()">
        ↓ Excel exportieren
      </button>
    </footer>
    <div class="toast" id="toast"></div>

    <script>
      /* STATE */
      var gFields = [],
        gSelected = new Set(),
        gRows = [],
        gView = "flat",
        gQuery = "",
        gFileName = "";

      /* STORAGE */
      var SKEY = "xmlex_v6";
      function stateSave() {
        try {
          localStorage.setItem(
            SKEY,
            JSON.stringify({
              fields: gFields,
              selected: Array.from(gSelected),
              rows: gRows,
              view: gView,
              fileName: gFileName,
            }),
          );
        } catch (e) {}
      }
      function stateLoad() {
        try {
          var d = JSON.parse(localStorage.getItem(SKEY) || "null");
          if (!d || !d.rows || !d.rows.length) return false;
          gFields = d.fields || [];
          gSelected = new Set(d.selected || []);
          gRows = d.rows || [];
          gView = d.view || "flat";
          gFileName = d.fileName || "";
          return true;
        } catch (e) {
          return false;
        }
      }

      /* STARTUP */
      if (stateLoad()) {
        el("fbar").classList.add("show");
        el("fname").textContent = gFileName + ".xml";
        el("fsize").textContent = gRows.length + " Datensätze (gecacht)";
        el("ebtn").disabled = gSelected.size === 0;
        setFooter();
        syncBtns();
        renderList();
        renderTable();
        showToast("Stand wiederhergestellt (" + gRows.length + " Datensätze)");
      }

      /* FILE */
      var dzEl = el("dz");
      el("fi").addEventListener("change", function (e) {
        if (e.target.files[0]) loadFile(e.target.files[0]);
      });
      dzEl.addEventListener("dragover", function (e) {
        e.preventDefault();
        dzEl.classList.add("over");
      });
      dzEl.addEventListener("dragleave", function () {
        dzEl.classList.remove("over");
      });
      dzEl.addEventListener("drop", function (e) {
        e.preventDefault();
        dzEl.classList.remove("over");
        if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
      });

      function loadFile(file) {
        gFileName = file.name.replace(/\.xml$/i, "");
        el("fbar").classList.add("show");
        el("fname").textContent = file.name;
        el("fsize").textContent = fmtB(file.size);
        setPg(0, "Lese Datei…");
        var r = new FileReader();
        r.onload = function (e) {
          try {
            parseXML(e.target.result);
          } catch (err) {
            hidePg();
            showToast("Fehler: " + err.message, true);
            console.error(err);
          }
        };
        r.readAsText(file);
      }
      function fmtB(n) {
        return n < 1024
          ? n + " B"
          : n < 1048576
            ? (n / 1024).toFixed(1) + " KB"
            : (n / 1048576).toFixed(1) + " MB";
      }

      /* ============================================================
         PARSER — completely rewritten for robustness
         ============================================================ */

      /* Get a clean tag name: strip namespace prefix, uppercase */
      function getTag(node) {
        var n = node.localName || node.nodeName || "";
        var i = n.indexOf(":");
        if (i !== -1) n = n.substring(i + 1);
        return n.toUpperCase();
      }

      /* Collect direct element children grouped by tag */
      function childGroups(node) {
        var groups = {};
        var order = [];
        for (var i = 0; i < node.childNodes.length; i++) {
          var ch = node.childNodes[i];
          if (ch.nodeType !== 1) continue; // elements only
          var t = getTag(ch);
          if (!groups[t]) {
            groups[t] = [];
            order.push(t);
          }
          groups[t].push(ch);
        }
        return { groups: groups, order: order };
      }

      /* Check if a node is a leaf (no element children) */
      function isLeaf(node) {
        for (var i = 0; i < node.childNodes.length; i++) {
          if (node.childNodes[i].nodeType === 1) return false;
        }
        return true;
      }

      /* Get text content of a node (direct text only for mixed content) */
      function getText(node) {
        var t = "";
        for (var i = 0; i < node.childNodes.length; i++) {
          var cn = node.childNodes[i];
          if (cn.nodeType === 3 || cn.nodeType === 4) t += cn.nodeValue;
        }
        return t.trim();
      }

      /* Find all elements with a given local tag name (case-insensitive, namespace-agnostic) */
      function findAll(root, tagUpper) {
        var results = [];
        var all = root.getElementsByTagName("*");
        for (var i = 0; i < all.length; i++) {
          if (getTag(all[i]) === tagUpper) results.push(all[i]);
        }
        return results;
      }

      /* Find the repeating row element */
      function findRowTag(root) {
        var counts = {}; // tag -> {max, depth}
        function scan(node, depth) {
          var info = childGroups(node);
          for (var i = 0; i < info.order.length; i++) {
            var tag = info.order[i];
            var cnt = info.groups[tag].length;
            if (
              !counts[tag] ||
              cnt > counts[tag].max ||
              (cnt === counts[tag].max && depth < counts[tag].depth)
            ) {
              counts[tag] = { max: cnt, depth: depth };
            }
            // recurse into children
            for (var j = 0; j < info.groups[tag].length; j++) {
              scan(info.groups[tag][j], depth + 1);
            }
          }
        }
        scan(root, 1);

        var best = getTag(root),
          bestCnt = 1,
          bestDep = 0;
        var tags = Object.keys(counts);
        for (var i = 0; i < tags.length; i++) {
          var c = counts[tags[i]];
          if (c.max > bestCnt || (c.max === bestCnt && c.depth < bestDep)) {
            bestCnt = c.max;
            bestDep = c.depth;
            best = tags[i];
          }
        }
        return best;
      }

      /* Detect key-value patterns in repeating child groups */
      function detectKVPatterns(sampleNode) {
        var kvMap = {};
        function detect(n) {
          // <-- Parameter war "node", kollidierte mit nichts, aber der Aufruf unten nutzte "node"
          var info = childGroups(n);
          for (var i = 0; i < info.order.length; i++) {
            var tag = info.order[i];
            var sibs = info.groups[tag];
            if (sibs.length >= 2) {
              var firstInfo = childGroups(sibs[0]);
              if (firstInfo.order.length >= 2) {
                var kTag = firstInfo.order[0];
                var vTag = firstInfo.order[1];
                var keys = {};
                var allHaveKey = true;
                for (var si = 0; si < sibs.length; si++) {
                  var kEls = findChildrenByTag(sibs[si], kTag);
                  if (kEls.length === 0) {
                    allHaveKey = false;
                    break;
                  }
                  keys[kEls[0].textContent.trim()] = 1;
                }
                if (allHaveKey && Object.keys(keys).length > 1) {
                  kvMap[tag] = { k: kTag, v: vTag };
                }
              }
            }
            if (sibs.length > 0) detect(sibs[0]); // Rekursion
          }
        }
        detect(sampleNode); // <-- HIER war der Bug: es stand "detect(node)" statt "detect(sampleNode)"
        return kvMap;
      }

      /* Find direct children with a specific tag */
      function findChildrenByTag(node, tagUpper) {
        var results = [];
        for (var i = 0; i < node.childNodes.length; i++) {
          var ch = node.childNodes[i];
          if (ch.nodeType === 1 && getTag(ch) === tagUpper) results.push(ch);
        }
        return results;
      }

      /* Walk a node and extract all fields into a row object */
      function walkNode(node, path, row, kvMap) {
        // Attributes
        if (node.attributes) {
          for (var ai = 0; ai < node.attributes.length; ai++) {
            var attr = node.attributes[ai];
            var aName = attr.name || attr.nodeName || "";
            // Skip namespace declarations
            if (aName === "xmlns" || aName.indexOf("xmlns:") === 0) continue;
            // Strip prefix from attribute name
            var cleanName = aName;
            var ci = cleanName.indexOf(":");
            if (ci !== -1) cleanName = cleanName.substring(ci + 1);
            row[path + "/@" + cleanName.toUpperCase()] = attr.value;
          }
        }

        // Leaf node
        if (isLeaf(node)) {
          var text = node.textContent ? node.textContent.trim() : "";
          row[path] = text;
          return;
        }

        // Process children
        var info = childGroups(node);
        for (var i = 0; i < info.order.length; i++) {
          var ctag = info.order[i];
          var sibs = info.groups[ctag];

          if (sibs.length >= 2 && kvMap[ctag]) {
            // KV pivot pattern
            var kv = kvMap[ctag];
            for (var si = 0; si < sibs.length; si++) {
              var sib = sibs[si];
              var kEls = findChildrenByTag(sib, kv.k);
              var vEls = findChildrenByTag(sib, kv.v);
              if (kEls.length === 0) continue;
              var keyName = kEls[0].textContent
                .trim()
                .replace(/[\/\\?*\[\]:]/g, "_");
              var col = path + "/" + ctag + "[" + keyName + "]";
              row[col] = vEls.length ? vEls[0].textContent.trim() : "";
              // Extra fields inside this KV element
              for (var sci = 0; sci < sib.childNodes.length; sci++) {
                var sc = sib.childNodes[sci];
                if (sc.nodeType !== 1) continue;
                var scTag = getTag(sc);
                if (scTag !== kv.k && scTag !== kv.v) {
                  walkNode(sc, col + "/" + scTag, row, kvMap);
                }
              }
            }
          } else if (sibs.length >= 2) {
            // Indexed repeating elements
            for (var ri = 0; ri < sibs.length; ri++) {
              walkNode(
                sibs[ri],
                path + "/" + ctag + "[" + (ri + 1) + "]",
                row,
                kvMap,
              );
            }
          } else {
            // Single child
            walkNode(sibs[0], path + "/" + ctag, row, kvMap);
          }
        }
      }

      function parseXML(text) {
        setPg(10, "Parse XML…");

        /* Fix bare & */
        text = text.replace(
          /&(?![a-zA-Z][a-zA-Z0-9]*;|#[0-9]+;|#x[0-9a-fA-F]+;)/g,
          "&amp;",
        );

        var root = null,
          errMsg = "";

        // Try strict XML parsing first
        try {
          var parser = new DOMParser();
          var doc = parser.parseFromString(text, "text/xml");
          var pe = doc.querySelector("parsererror");
          if (pe) {
            errMsg = pe.textContent.substring(0, 120);
          } else {
            root = doc.documentElement;
          }
        } catch (e) {
          errMsg = String(e);
        }

        // Fallback: try as HTML
        if (!root) {
          try {
            var parser2 = new DOMParser();
            var doc2 = parser2.parseFromString(text, "text/html");
            var body = doc2.body;
            if (body && body.children.length > 0) {
              // Find the first real element (skip script, style, etc.)
              for (var fi = 0; fi < body.children.length; fi++) {
                var cand = body.children[fi];
                var tn = (cand.tagName || "").toLowerCase();
                if (tn !== "script" && tn !== "style" && tn !== "link") {
                  root = cand;
                  break;
                }
              }
            }
          } catch (e) {}
        }

        if (!root) {
          hidePg();
          showToast(
            "XML Fehler: " + (errMsg || "Konnte nicht geparst werden"),
            true,
          );
          return;
        }

        // Skip wrapper elements with single child (like html > body > root)
        var safety = 0;
        while (root.children.length === 1 && safety < 5) {
          var onlyChild = root.children[0];
          var onlyTag = (onlyChild.tagName || "").toLowerCase();
          if (onlyTag === "head" || onlyTag === "body") {
            // It's an HTML wrapper, go into body
            var bodyEl = root.querySelector("body");
            if (bodyEl && bodyEl.children.length > 0) {
              root = bodyEl.children[0];
              break;
            }
          }
          // Don't unwrap if the single child itself has siblings at the next level
          break;
        }

        setPg(25, "Erkunde Struktur…");

        // Find the repeating row tag
        var rowTag = findRowTag(root);
        var rowEls = findAll(root, rowTag);

        // If root itself is the "rowTag" and there are no descendants with that tag, treat root's children
        if (
          rowEls.length === 0 ||
          (rowEls.length === 1 && rowEls[0] === root)
        ) {
          // Maybe each direct child of root is a row
          var kids = [];
          for (var ki = 0; ki < root.children.length; ki++) {
            kids.push(root.children[ki]);
          }
          if (kids.length > 0) {
            rowEls = kids;
            rowTag = getTag(kids[0]);
          }
        }

        if (rowEls.length === 0) {
          hidePg();
          showToast("Keine Datensätze gefunden", true);
          return;
        }

        setPg(40, rowEls.length + " Datensätze…");

        // Detect KV patterns from first row element
        var kvMap = {};
        if (rowEls.length > 0) {
          kvMap = detectKVPatterns(rowEls[0]);
        }

        setPg(55, "Extrahiere Felder…");

        // Extract all rows
        var newRows = [];
        for (var i = 0; i < rowEls.length; i++) {
          var row = {};
          walkNode(rowEls[i], rowTag, row, kvMap);
          newRows.push(row);
          // Progress update every 500 rows
          if (i % 500 === 0 && i > 0) {
            setPg(
              55 + Math.floor((i / rowEls.length) * 25),
              "Verarbeite " + i + "/" + rowEls.length + "…",
            );
          }
        }

        setPg(82, "Baue Feldliste…");

        // Build field list preserving document order
        var fieldOrder = {};
        var fieldCount = {};
        var orderIdx = 0;

        for (var ri2 = 0; ri2 < newRows.length; ri2++) {
          var keys = Object.keys(newRows[ri2]);
          for (var ki2 = 0; ki2 < keys.length; ki2++) {
            var k = keys[ki2];
            if (fieldOrder[k] === undefined) {
              fieldOrder[k] = orderIdx++;
            }
            var val = newRows[ri2][k];
            if (val !== undefined && val !== "") {
              fieldCount[k] = (fieldCount[k] || 0) + 1;
            } else {
              if (fieldCount[k] === undefined) fieldCount[k] = 0;
            }
          }
        }

        var allPaths = Object.keys(fieldOrder);
        allPaths.sort(function (a, b) {
          return fieldOrder[a] - fieldOrder[b];
        });

        gFields = allPaths.map(function (path) {
          var parts = path.split("/");
          var lastPart = parts[parts.length - 1];
          var isAttr = lastPart.charAt(0) === "@";
          return {
            path: path,
            leaf: isAttr ? lastPart.slice(1) : lastPart,
            isAttr: isAttr,
            count: fieldCount[path] || 0,
          };
        });

        gRows = newRows;
        gSelected = new Set();

        setPg(100, "Fertig!");
        setTimeout(hidePg, 700);
        el("ebtn").disabled = true;
        setFooter();
        syncBtns();
        renderList();
        renderTable();
        showToast(
          gRows.length + " Datensätze, " + gFields.length + " Felder erkannt",
        );
        stateSave();
      }

      /* FIELD LIST */
      function renderList() {
        var c = el("flist");
        if (!gFields.length) {
          c.innerHTML =
            '<div class="empty-msg">← XML hochladen<br>um Felder zu erkunden</div>';
          return;
        }
        var list = gFields.slice();
        if (gQuery) {
          var q = gQuery.toLowerCase();
          list = list.filter(function (f) {
            return f.path.toLowerCase().indexOf(q) !== -1;
          });
        }
        if (gView === "az")
          list.sort(function (a, b) {
            return a.path.localeCompare(b.path);
          });
        if (!list.length) {
          c.innerHTML = '<div class="empty-msg">Keine Treffer</div>';
          return;
        }
        var h = "";
        for (var i = 0; i < list.length; i++) {
          var f = list[i],
            sel = gSelected.has(f.path);
          var kvm = f.path.match(/^(.*?)(\[[^\]]+\].*)$/);
          var pre, lf;
          if (kvm) {
            pre = kvm[1].replace(/\/$/, "");
            lf = kvm[2];
          } else {
            var pts = f.path.split("/");
            pre = pts.slice(0, -1).join("/");
            lf = pts[pts.length - 1];
          }
          var lfc = f.isAttr ? "lf at" : "lf";
          var dp = pre
            ? '<span style="color:var(--muted)">' +
              esc(pre) +
              '/</span><span class="' +
              lfc +
              '">' +
              esc(lf) +
              "</span>"
            : '<span class="' + lfc + '">' + esc(lf) + "</span>";
          h +=
            '<div class="fi' +
            (sel ? " sel" : "") +
            '" data-path="' +
            esc(f.path) +
            '" onclick="doToggle(this)"><div class="fck"></div><div class="fp" title="' +
            esc(f.path) +
            '">' +
            dp +
            '</div><div class="fc">' +
            f.count +
            "</div></div>";
        }
        c.innerHTML = h;
      }

      function doToggle(e) {
        var p = e.getAttribute("data-path");
        if (!p) return;
        if (gSelected.has(p)) gSelected.delete(p);
        else gSelected.add(p);
        el("ebtn").disabled = gSelected.size === 0;
        syncBtns();
        renderList();
        renderTable();
        stateSave();
      }
      function doAll() {
        gFields.forEach(function (f) {
          gSelected.add(f.path);
        });
        el("ebtn").disabled = false;
        syncBtns();
        renderList();
        renderTable();
        stateSave();
      }
      function doNone() {
        gSelected.clear();
        el("ebtn").disabled = true;
        syncBtns();
        renderList();
        renderTable();
        stateSave();
      }
      function doView(v) {
        gView = v;
        syncBtns();
        renderList();
        stateSave();
      }
      function doSearch(q) {
        gQuery = q;
        renderList();
      }
      function syncBtns() {
        var n = 0;
        for (var i = 0; i < gFields.length; i++) {
          if (gSelected.has(gFields[i].path)) n++;
        }
        el("btnAll").className =
          "tbtn" + (gFields.length > 0 && n === gFields.length ? " on" : "");
        el("btnNone").className = "tbtn" + (n === 0 ? " on" : "");
        el("btnFlat").className = "tbtn" + (gView === "flat" ? " on" : "");
        el("btnSort").className = "tbtn" + (gView === "az" ? " on" : "");
      }

      /* PREVIEW */
      var PLIMIT = 200;
      function renderTable() {
        var wrap = el("twrap"),
          stats = el("rstats");
        if (!gSelected.size) {
          wrap.innerHTML =
            '<div class="pempty"><div class="icon">⬡</div><div>Felder auswählen für Vorschau</div></div>';
          stats.innerHTML = "—";
          return;
        }
        var cols = Array.from(gSelected),
          labels = cols.map(pathLabel),
          slice = gRows.slice(0, PLIMIT);
        var th = "";
        for (var ci = 0; ci < cols.length; ci++)
          th +=
            "<th>" +
            esc(labels[ci]) +
            '<span class="thx" data-path="' +
            esc(cols[ci]) +
            '" onclick="doRmCol(this)">✕</span></th>';
        var tb = "";
        for (var ri = 0; ri < slice.length; ri++) {
          tb += "<tr>";
          for (var ci2 = 0; ci2 < cols.length; ci2++) {
            var v = slice[ri][cols[ci2]];
            tb +=
              v !== undefined && v !== ""
                ? '<td title="' + esc(v) + '">' + esc(v) + "</td>"
                : '<td class="nil">—</td>';
          }
          tb += "</tr>";
        }
        wrap.innerHTML =
          "<table><thead><tr>" +
          th +
          "</tr></thead><tbody>" +
          tb +
          "</tbody></table>";
        stats.innerHTML =
          "<b>" +
          gRows.length +
          "</b> Zeilen · <b>" +
          cols.length +
          "</b> Spalten" +
          (gRows.length > PLIMIT ? " · Vorschau: " + PLIMIT : "");
      }
      function doRmCol(e) {
        var p = e.getAttribute("data-path");
        gSelected.delete(p);
        el("ebtn").disabled = gSelected.size === 0;
        syncBtns();
        renderList();
        renderTable();
        stateSave();
      }

      /* EXPORT */
      function doExport() {
        if (!gSelected.size || !gRows.length) return;
        var cols = Array.from(gSelected),
          labels = cols.map(pathLabel),
          data = [labels];
        for (var ri = 0; ri < gRows.length; ri++) {
          var row = [];
          for (var ci = 0; ci < cols.length; ci++) {
            var v = gRows[ri][cols[ci]];
            row.push(v !== undefined ? v : "");
          }
          data.push(row);
        }
        var ws = XLSX.utils.aoa_to_sheet(data);
        var rng = XLSX.utils.decode_range(ws["!ref"]);
        for (var c = rng.s.c; c <= rng.e.c; c++) {
          var cell = ws[XLSX.utils.encode_cell({ r: 0, c: c })];
          if (cell)
            cell.s = {
              font: { bold: true, name: "Arial", sz: 10 },
              fill: { fgColor: { rgb: "DBEAFE" }, patternType: "solid" },
              alignment: { horizontal: "left" },
            };
        }
        ws["!cols"] = labels.map(function (lbl, ci) {
          var mx = lbl.length;
          for (var ri = 0; ri < Math.min(gRows.length, 100); ri++) {
            var v = gRows[ri][cols[ci]];
            if (v && v.length > mx) mx = v.length;
          }
          return { wch: Math.min(mx + 2, 50) };
        });
        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Extraktion");
        XLSX.writeFile(
          wb,
          (gFileName || "export") +
            "_" +
            new Date().toISOString().slice(0, 10) +
            ".xlsx",
        );
        showToast(gRows.length + " Zeilen exportiert");
      }

      /* UTILS */
      function el(id) {
        return document.getElementById(id);
      }
      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
      function pathLabel(path) {
        var m = path.match(/\[([^\]]+)\](?:\/([^\/]+))?$/);
        if (m) return m[2] ? m[1] + " / " + m[2] : m[1];
        return path.split("/").pop().replace("@", "");
      }
      function setFooter() {
        el("finfo").innerHTML =
          "<b>" +
          gRows.length +
          "</b> Datensätze · <b>" +
          gFields.length +
          "</b> Felder erkannt";
      }
      function setPg(pct, lbl) {
        el("pgwrap").classList.add("show");
        el("pgfill").style.width = pct + "%";
        el("pglbl").textContent = lbl;
      }
      function hidePg() {
        el("pgwrap").classList.remove("show");
      }
      var _tt;
      function showToast(msg, isErr) {
        var t = el("toast");
        t.textContent = msg;
        t.className = "toast show" + (isErr ? " err" : "");
        clearTimeout(_tt);
        _tt = setTimeout(function () {
          t.classList.remove("show");
        }, 3000);
      }
    </script>
  </body>
</html>
