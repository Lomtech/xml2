<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XML → Excel Extractor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap");
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #f5f5f3;
        --surf: #fff;
        --surf2: #f0f0ee;
        --brd: #ddddd9;
        --brdhi: #c0c0bc;
        --blue: #2563eb;
        --txt: #1a1a1a;
        --muted: #8a8a85;
        --red: #dc2626;
        --mono: "IBM Plex Mono", monospace;
        --sans: "IBM Plex Sans", sans-serif;
      }
      body {
        background: var(--bg);
        color: var(--txt);
        font-family: var(--sans);
        font-size: 14px;
        height: 100vh;
        overflow: hidden;
        display: grid;
        grid-template-rows: 57px 1fr 41px;
      }
      header {
        border-bottom: 1px solid var(--brd);
        padding: 0 32px;
        display: flex;
        align-items: center;
        background: var(--surf);
      }
      .logo {
        font-family: var(--mono);
        font-weight: 600;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .logo em {
        color: var(--muted);
        font-style: normal;
      }
      .sub {
        color: var(--muted);
        font-size: 12px;
        font-family: var(--mono);
        margin-left: 16px;
      }
      main {
        display: grid;
        grid-template-columns: 380px 1fr;
        overflow: hidden;
      }
      .lp {
        border-right: 1px solid var(--brd);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .sec {
        border-bottom: 1px solid var(--brd);
        padding: 18px 20px;
        flex-shrink: 0;
      }
      .sec.grow {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        border-bottom: none;
      }
      .lbl {
        font-family: var(--mono);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        margin-bottom: 10px;
      }
      .dz {
        border: 1px dashed var(--brdhi);
        background: var(--surf2);
        border-radius: 4px;
        padding: 22px 16px;
        text-align: center;
        cursor: pointer;
        position: relative;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      .dz:hover,
      .dz.over {
        border-color: var(--blue);
        background: rgba(37, 99, 235, 0.03);
      }
      .dz input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
      }
      .dz-icon {
        font-size: 24px;
      }
      .dz-txt {
        color: var(--muted);
        font-size: 12px;
        margin-top: 6px;
        line-height: 1.5;
      }
      .dz-txt strong {
        display: block;
        color: var(--txt);
        font-size: 13px;
      }
      .fbar {
        display: none;
        align-items: center;
        gap: 10px;
        background: var(--surf2);
        border: 1px solid var(--brd);
        border-radius: 4px;
        padding: 10px 14px;
        font-family: var(--mono);
        font-size: 11px;
        margin-top: 10px;
      }
      .fbar.show {
        display: flex;
      }
      .fdot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--blue);
        flex-shrink: 0;
      }
      .fname {
        color: var(--blue);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }
      .fsize {
        color: var(--muted);
        flex-shrink: 0;
      }
      .pgwrap {
        display: none;
        margin-top: 10px;
      }
      .pgwrap.show {
        display: block;
      }
      .pgtrack {
        height: 2px;
        background: var(--brd);
        border-radius: 1px;
        overflow: hidden;
      }
      .pgfill {
        height: 100%;
        background: var(--blue);
        width: 0;
        transition: width 0.2s;
      }
      .pglbl {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
        margin-top: 5px;
      }
      .tctrl {
        display: flex;
        gap: 5px;
        flex-shrink: 0;
        margin-bottom: 8px;
      }
      .tbtn {
        background: var(--surf2);
        border: 1px solid var(--brd);
        color: var(--muted);
        font-family: var(--mono);
        font-size: 10px;
        padding: 4px 10px;
        border-radius: 3px;
        cursor: pointer;
        transition: all 0.1s;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .tbtn:hover {
        color: var(--txt);
        border-color: var(--brdhi);
      }
      .tbtn.on {
        color: var(--blue);
        border-color: var(--blue);
        background: rgba(37, 99, 235, 0.06);
      }
      .sinp {
        width: 100%;
        background: var(--surf2);
        border: 1px solid var(--brd);
        color: var(--txt);
        font-family: var(--mono);
        font-size: 11px;
        padding: 7px 10px;
        border-radius: 3px;
        outline: none;
        margin-bottom: 8px;
        flex-shrink: 0;
        transition: border-color 0.15s;
      }
      .sinp:focus {
        border-color: var(--blue);
      }
      .sinp::placeholder {
        color: var(--muted);
      }
      .fscroll {
        flex: 1;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--brd) transparent;
      }
      .empty-msg {
        color: var(--muted);
        font-size: 12px;
        text-align: center;
        padding: 32px 16px;
        line-height: 1.8;
        font-family: var(--mono);
      }
      .fi {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 8px;
        border-radius: 3px;
        cursor: pointer;
        transition: background 0.08s;
        user-select: none;
      }
      .fi:hover {
        background: var(--surf2);
      }
      .fi.sel {
        background: rgba(37, 99, 235, 0.06);
      }
      .fck {
        width: 14px;
        height: 14px;
        border: 1px solid var(--brdhi);
        border-radius: 2px;
        flex-shrink: 0;
        position: relative;
        transition: all 0.1s;
      }
      .fi.sel .fck {
        background: var(--blue);
        border-color: var(--blue);
      }
      .fi.sel .fck::after {
        content: "";
        position: absolute;
        left: 3px;
        top: 1px;
        width: 6px;
        height: 9px;
        border: 1.5px solid #fff;
        border-top: none;
        border-left: none;
        transform: rotate(45deg);
      }
      .fp {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .fp .lf {
        color: var(--txt);
      }
      .fp .lf.at {
        color: var(--blue);
      }
      .fc {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--brdhi);
        flex-shrink: 0;
      }
      .rp {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .rh {
        border-bottom: 1px solid var(--brd);
        padding: 0 24px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--surf);
        flex-shrink: 0;
      }
      .rtitle {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .rstats {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
      }
      .rstats b {
        color: var(--blue);
        font-weight: normal;
      }
      .twrap {
        flex: 1;
        overflow: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--brd) transparent;
      }
      .pempty {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 12px;
        gap: 12px;
      }
      .pempty .icon {
        font-size: 36px;
        opacity: 0.25;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-family: var(--mono);
        font-size: 11px;
      }
      thead th {
        position: sticky;
        top: 0;
        background: var(--surf);
        border-bottom: 1px solid var(--brdhi);
        padding: 9px 14px;
        text-align: left;
        font-weight: 600;
        color: var(--txt);
        white-space: nowrap;
        z-index: 10;
      }
      .thx {
        display: inline-block;
        margin-left: 8px;
        color: var(--muted);
        cursor: pointer;
        font-size: 10px;
        font-weight: normal;
      }
      .thx:hover {
        color: var(--red);
      }
      tbody tr {
        border-bottom: 1px solid var(--brd);
      }
      tbody tr:hover {
        background: var(--surf2);
      }
      tbody td {
        padding: 7px 14px;
        max-width: 220px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      tbody td.nil {
        color: var(--brdhi);
      }
      footer {
        border-top: 1px solid var(--brd);
        padding: 0 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--surf);
        flex-shrink: 0;
      }
      .finfo {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
      }
      .finfo b {
        color: var(--blue);
        font-weight: normal;
      }
      .ebtn {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--txt);
        color: #fff;
        border: none;
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 8px 20px;
        border-radius: 3px;
        cursor: pointer;
        transition:
          background 0.15s,
          transform 0.1s;
      }
      .ebtn:hover {
        background: #333;
        transform: translateY(-1px);
      }
      .ebtn:active {
        transform: none;
      }
      .ebtn:disabled {
        background: var(--brd);
        color: var(--muted);
        cursor: not-allowed;
        transform: none;
      }
      .toast {
        position: fixed;
        bottom: 56px;
        right: 24px;
        background: var(--surf);
        border: 1px solid var(--brd);
        border-left: 3px solid var(--blue);
        border-radius: 4px;
        padding: 11px 16px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--txt);
        z-index: 999;
        max-width: 320px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        transform: translateX(140%);
        transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .toast.show {
        transform: translateX(0);
      }
      .toast.err {
        border-left-color: var(--red);
      }
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--brd);
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">XML<em> → </em>XLS<em> // </em>Extractor</div>
      <div class="sub">Generic field extractor · any depth · any schema</div>
    </header>
    <main>
      <div class="lp">
        <div class="sec">
          <div class="lbl">01 / XML Datei</div>
          <div class="dz" id="dz">
            <input type="file" id="fi" accept=".xml,text/xml,application/xml" />
            <div class="dz-icon">⬡</div>
            <div class="dz-txt">
              <strong>XML hochladen</strong>Drag &amp; Drop oder klicken
            </div>
          </div>
          <div class="fbar" id="fbar">
            <div class="fdot"></div>
            <span class="fname" id="fname"></span
            ><span class="fsize" id="fsize"></span>
          </div>
          <div class="pgwrap" id="pgwrap">
            <div class="pgtrack"><div class="pgfill" id="pgfill"></div></div>
            <div class="pglbl" id="pglbl">Analysiere…</div>
          </div>
        </div>
        <div class="sec grow">
          <div class="lbl">02 / Felder auswählen</div>
          <div class="tctrl">
            <button class="tbtn" id="btnAll" onclick="doAll()">Alle</button>
            <button class="tbtn" id="btnNone" onclick="doNone()">Keine</button>
            <button class="tbtn" id="btnFlat" onclick="doView('flat')">
              Flat
            </button>
            <button class="tbtn" id="btnSort" onclick="doView('az')">
              A–Z
            </button>
          </div>
          <input
            class="sinp"
            id="sinp"
            type="text"
            placeholder="Felder filtern…"
            oninput="doSearch(this.value)"
          />
          <div class="fscroll" id="flist">
            <div class="empty-msg">
              ← XML hochladen<br />um Felder zu erkunden
            </div>
          </div>
        </div>
      </div>
      <div class="rp">
        <div class="rh">
          <div class="rtitle">Vorschau</div>
          <div class="rstats" id="rstats">—</div>
        </div>
        <div class="twrap" id="twrap">
          <div class="pempty">
            <div class="icon">⬡</div>
            <div>Felder auswählen für Vorschau</div>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <div class="finfo" id="finfo">Kein Dokument geladen</div>
      <button class="ebtn" id="ebtn" disabled onclick="doExport()">
        ↓ Excel exportieren
      </button>
    </footer>
    <div class="toast" id="toast"></div>

    <script>
      /* STATE */
      var gFields = [],
        gSelected = new Set(),
        gRows = [],
        gView = "flat",
        gQuery = "",
        gFileName = "";

      /* STORAGE */
      var SKEY = "xmlex_v5";
      function stateSave() {
        try {
          localStorage.setItem(
            SKEY,
            JSON.stringify({
              fields: gFields,
              selected: Array.from(gSelected),
              rows: gRows,
              view: gView,
              fileName: gFileName,
            }),
          );
        } catch (e) {}
      }
      function stateLoad() {
        try {
          var d = JSON.parse(localStorage.getItem(SKEY) || "null");
          if (!d || !d.rows || !d.rows.length) return false;
          gFields = d.fields || [];
          gSelected = new Set(d.selected || []);
          gRows = d.rows || [];
          gView = d.view || "flat";
          gFileName = d.fileName || "";
          return true;
        } catch (e) {
          return false;
        }
      }

      /* STARTUP */
      if (stateLoad()) {
        el("fbar").classList.add("show");
        el("fname").textContent = gFileName + ".xml";
        el("fsize").textContent = gRows.length + " Datensätze (gecacht)";
        el("ebtn").disabled = gSelected.size === 0;
        setFooter();
        syncBtns();
        renderList();
        renderTable();
        showToast("Stand wiederhergestellt (" + gRows.length + " Datensätze)");
      }

      /* FILE */
      var dzEl = el("dz");
      el("fi").addEventListener("change", function (e) {
        if (e.target.files[0]) loadFile(e.target.files[0]);
      });
      dzEl.addEventListener("dragover", function (e) {
        e.preventDefault();
        dzEl.classList.add("over");
      });
      dzEl.addEventListener("dragleave", function () {
        dzEl.classList.remove("over");
      });
      dzEl.addEventListener("drop", function (e) {
        e.preventDefault();
        dzEl.classList.remove("over");
        if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
      });

      function loadFile(file) {
        gFileName = file.name.replace(/\.xml$/i, "");
        el("fbar").classList.add("show");
        el("fname").textContent = file.name;
        el("fsize").textContent = fmtB(file.size);
        setPg(0, "Lese Datei…");
        var r = new FileReader();
        r.onload = function (e) {
          parseXML(e.target.result);
        };
        r.readAsText(file);
      }
      function fmtB(n) {
        return n < 1024
          ? n + " B"
          : n < 1048576
            ? (n / 1024).toFixed(1) + " KB"
            : (n / 1048576).toFixed(1) + " MB";
      }

      /* ============================================================
   PARSER
   Verified against real namespaced XML (xmlns="...").
   Key design:
   - tagUC(node): returns uppercase localName, strips namespace prefix
   - nsFind(parent,tag): uses getElementsByTagNameNS('*',tag) which works
     regardless of default or prefixed XML namespaces
   - Row anchor: element with highest direct-child repeat count, ties broken
     by shallowest depth — correctly picks INVESTMENT over INVESTMENTIDENTIFIER
   - walkNodeAt(node, fullPath, row): fullPath is the COMPLETE path for THIS
     node (pre-built by caller), so we never double-append the tag name
   ============================================================ */

      function tagUC(node) {
        var n = node.localName || node.tagName || "";
        if (n.indexOf(":") !== -1) n = n.split(":").pop();
        return n.toUpperCase();
      }

      /* Namespace-safe search: works for xmlns= documents AND plain HTML-parsed docs */
      function nsFind(parent, localTag) {
        var r = Array.from(parent.getElementsByTagNameNS("*", localTag));
        if (!r.length) r = Array.from(parent.getElementsByTagName(localTag));
        if (!r.length)
          r = Array.from(parent.getElementsByTagName(localTag.toLowerCase()));
        return r;
      }

      /* Group direct children by uppercase local tag name */
      function groupKids(node) {
        var g = {};
        for (var i = 0; i < node.children.length; i++) {
          var t = tagUC(node.children[i]);
          if (!g[t]) g[t] = [];
          g[t].push(node.children[i]);
        }
        return g;
      }

      /* Walk node where `path` is the ALREADY-COMPLETE path for this node.
   Children get path = path + '/' + childTag  (or indexed variant) */
      function walkNodeAt(node, path, row, kvMap) {
        /* attributes */
        for (var ai = 0; ai < node.attributes.length; ai++) {
          var a = node.attributes[ai];
          if (a.name.indexOf(":") === -1)
            row[path + "/@" + a.name.toUpperCase()] = a.value;
        }
        /* leaf */
        if (!node.children.length) {
          row[path] = node.textContent.trim();
          return;
        }

        var gr = groupKids(node);
        var tags = Object.keys(gr);
        for (var ti = 0; ti < tags.length; ti++) {
          var ctag = tags[ti],
            sibs = gr[ctag];
          if (sibs.length >= 2 && kvMap[ctag]) {
            /* KV pivot */
            var kv = kvMap[ctag];
            for (var si = 0; si < sibs.length; si++) {
              var sib = sibs[si];
              var kEls = nsFind(sib, kv.k),
                vEls = nsFind(sib, kv.v);
              if (!kEls.length) continue;
              var kn = kEls[0].textContent
                .trim()
                .replace(/[\/\\?*\[\]:]/g, "_");
              var col = path + "/" + ctag + "[" + kn + "]";
              row[col] = vEls.length ? vEls[0].textContent.trim() : "";
              /* any extra fields inside this KV element */
              for (var sci = 0; sci < sib.children.length; sci++) {
                var sc = sib.children[sci];
                if (tagUC(sc) !== kv.k && tagUC(sc) !== kv.v)
                  walkNodeAt(sc, col + "/" + tagUC(sc), row, kvMap);
              }
            }
          } else if (sibs.length >= 2) {
            /* Indexed repeating elements */
            for (var ri2 = 0; ri2 < sibs.length; ri2++)
              walkNodeAt(
                sibs[ri2],
                path + "/" + ctag + "[" + (ri2 + 1) + "]",
                row,
                kvMap,
              );
          } else {
            walkNodeAt(sibs[0], path + "/" + ctag, row, kvMap);
          }
        }
      }

      function parseXML(text) {
        setPg(10, "Parse XML…");

        /* Fix bare & */
        text = text.replace(
          /&(?![a-zA-Z][a-zA-Z0-9]*;|#[0-9]+;|#x[0-9a-fA-F]+;)/g,
          "&amp;",
        );

        /* Parse — try strict XML first (required for xmlns= namespaced documents) */
        var root = null,
          errMsg = "";
        try {
          var doc = new DOMParser().parseFromString(text, "text/xml");
          var pe = doc.querySelector("parsererror");
          if (pe) errMsg = pe.textContent.slice(0, 120);
          else root = doc.documentElement;
        } catch (e) {
          errMsg = String(e);
        }

        /* Fallback: innerHTML repair for broken XML */
        if (!root) {
          try {
            var div = document.createElement("div");
            div.innerHTML = text
              .replace(/<\?xml[^?]*\?>/gi, "")
              .replace(/<!DOCTYPE[^>]*>/gi, "")
              .trim();
            if (div.children.length) root = div.children[0];
          } catch (e) {}
        }

        if (!root) {
          hidePg();
          showToast("XML Fehler: " + errMsg, true);
          return;
        }

        setPg(25, "Erkunde Struktur…");

        /* Find row anchor: tag with highest direct-child repeat, shallowest depth wins ties */
        var repInfo = {};
        function scanRep(node, depth) {
          var gr = groupKids(node);
          var ts = Object.keys(gr);
          for (var i = 0; i < ts.length; i++) {
            var t = ts[i],
              cnt = gr[t].length;
            if (!repInfo[t]) repInfo[t] = { cnt: cnt, depth: depth + 1 };
            else if (cnt > repInfo[t].cnt)
              repInfo[t] = { cnt: cnt, depth: depth + 1 };
            else if (cnt === repInfo[t].cnt && depth + 1 < repInfo[t].depth)
              repInfo[t].depth = depth + 1;
            for (var j = 0; j < gr[t].length; j++) scanRep(gr[t][j], depth + 1);
          }
        }
        scanRep(root, 0);

        var rowTag = tagUC(root),
          bestCnt = 0,
          bestDep = 999;
        var rkeys = Object.keys(repInfo);
        for (var ri = 0; ri < rkeys.length; ri++) {
          var inf = repInfo[rkeys[ri]];
          if (
            inf.cnt > bestCnt ||
            (inf.cnt === bestCnt && inf.depth < bestDep)
          ) {
            bestCnt = inf.cnt;
            bestDep = inf.depth;
            rowTag = rkeys[ri];
          }
        }
        var rowEls = nsFind(root, rowTag);
        setPg(40, rowEls.length + " Datensätze…");

        /* Detect KV patterns */
        var kvMap = {};
        function detectKV(node) {
          var gr = groupKids(node);
          var ts = Object.keys(gr);
          for (var i = 0; i < ts.length; i++) {
            var t = ts[i],
              sibs = gr[t];
            if (sibs.length >= 2 && sibs[0].children.length >= 2) {
              var kTag = tagUC(sibs[0].children[0]);
              var vTag = tagUC(sibs[0].children[1]);
              var keys = {};
              for (var si = 0; si < sibs.length; si++) {
                var kEls = nsFind(sibs[si], kTag);
                if (kEls.length) keys[kEls[0].textContent.trim()] = 1;
              }
              if (Object.keys(keys).length > 1) kvMap[t] = { k: kTag, v: vTag };
            }
            detectKV(sibs[0]);
          }
        }
        if (rowEls.length) detectKV(rowEls[0]);

        setPg(55, "Extrahiere Felder…");

        /* Extract rows */
        var newRows = [];
        for (var i = 0; i < rowEls.length; i++) {
          var row = {};
          walkNodeAt(rowEls[i], rowTag, row, kvMap);
          newRows.push(row);
        }

        setPg(82, "Baue Feldliste…");

        /* Build field list in document order */
        var cmap = {},
          omap = {},
          oi = 0;
        for (var ri2 = 0; ri2 < newRows.length; ri2++) {
          var ks = Object.keys(newRows[ri2]);
          for (var ki = 0; ki < ks.length; ki++) {
            var k = ks[ki];
            if (omap[k] === undefined) omap[k] = oi++;
            if (newRows[ri2][k] !== "") cmap[k] = (cmap[k] || 0) + 1;
            else if (cmap[k] === undefined) cmap[k] = 0;
          }
        }
        gFields = Object.keys(cmap)
          .sort(function (a, b) {
            return (omap[a] || 0) - (omap[b] || 0);
          })
          .map(function (path) {
            var pts = path.split("/"),
              lf = pts[pts.length - 1],
              isA = lf.charAt(0) === "@";
            return {
              path: path,
              leaf: isA ? lf.slice(1) : lf,
              isAttr: isA,
              count: cmap[path],
            };
          });
        gRows = newRows;
        gSelected = new Set();

        setPg(100, "Fertig!");
        setTimeout(hidePg, 700);
        el("ebtn").disabled = true;
        setFooter();
        syncBtns();
        renderList();
        renderTable();
        showToast(
          gRows.length + " Datensätze, " + gFields.length + " Felder erkannt",
        );
        stateSave();
      }

      /* FIELD LIST */
      function renderList() {
        var c = el("flist");
        if (!gFields.length) {
          c.innerHTML =
            '<div class="empty-msg">← XML hochladen<br>um Felder zu erkunden</div>';
          return;
        }
        var list = gFields.slice();
        if (gQuery) {
          var q = gQuery.toLowerCase();
          list = list.filter(function (f) {
            return f.path.toLowerCase().indexOf(q) !== -1;
          });
        }
        if (gView === "az")
          list.sort(function (a, b) {
            return a.path.localeCompare(b.path);
          });
        if (!list.length) {
          c.innerHTML = '<div class="empty-msg">Keine Treffer</div>';
          return;
        }
        var h = "";
        for (var i = 0; i < list.length; i++) {
          var f = list[i],
            sel = gSelected.has(f.path);
          var kvm = f.path.match(/^(.*?)(\[[^\]]+\].*)$/);
          var pre, lf;
          if (kvm) {
            pre = kvm[1].replace(/\/$/, "");
            lf = kvm[2];
          } else {
            var pts = f.path.split("/");
            pre = pts.slice(0, -1).join("/");
            lf = pts[pts.length - 1];
          }
          var lfc = f.isAttr ? "lf at" : "lf";
          var dp = pre
            ? '<span style="color:var(--muted)">' +
              esc(pre) +
              '/</span><span class="' +
              lfc +
              '">' +
              esc(lf) +
              "</span>"
            : '<span class="' + lfc + '">' + esc(lf) + "</span>";
          h +=
            '<div class="fi' +
            (sel ? " sel" : "") +
            '" data-path="' +
            esc(f.path) +
            '" onclick="doToggle(this)"><div class="fck"></div><div class="fp" title="' +
            esc(f.path) +
            '">' +
            dp +
            '</div><div class="fc">' +
            f.count +
            "</div></div>";
        }
        c.innerHTML = h;
      }

      function doToggle(e) {
        var p = e.getAttribute("data-path");
        if (!p) return;
        if (gSelected.has(p)) gSelected.delete(p);
        else gSelected.add(p);
        el("ebtn").disabled = gSelected.size === 0;
        syncBtns();
        renderList();
        renderTable();
        stateSave();
      }
      function doAll() {
        gFields.forEach(function (f) {
          gSelected.add(f.path);
        });
        el("ebtn").disabled = false;
        syncBtns();
        renderList();
        renderTable();
        stateSave();
      }
      function doNone() {
        gSelected.clear();
        el("ebtn").disabled = true;
        syncBtns();
        renderList();
        renderTable();
        stateSave();
      }
      function doView(v) {
        gView = v;
        syncBtns();
        renderList();
        stateSave();
      }
      function doSearch(q) {
        gQuery = q;
        renderList();
      }
      function syncBtns() {
        var n = 0;
        for (var i = 0; i < gFields.length; i++) {
          if (gSelected.has(gFields[i].path)) n++;
        }
        el("btnAll").className =
          "tbtn" + (gFields.length > 0 && n === gFields.length ? " on" : "");
        el("btnNone").className = "tbtn" + (n === 0 ? " on" : "");
        el("btnFlat").className = "tbtn" + (gView === "flat" ? " on" : "");
        el("btnSort").className = "tbtn" + (gView === "az" ? " on" : "");
      }

      /* PREVIEW */
      var PLIMIT = 200;
      function renderTable() {
        var wrap = el("twrap"),
          stats = el("rstats");
        if (!gSelected.size) {
          wrap.innerHTML =
            '<div class="pempty"><div class="icon">⬡</div><div>Felder auswählen für Vorschau</div></div>';
          stats.innerHTML = "—";
          return;
        }
        var cols = Array.from(gSelected),
          labels = cols.map(pathLabel),
          slice = gRows.slice(0, PLIMIT);
        var th = "";
        for (var ci = 0; ci < cols.length; ci++)
          th +=
            "<th>" +
            esc(labels[ci]) +
            '<span class="thx" data-path="' +
            esc(cols[ci]) +
            '" onclick="doRmCol(this)">✕</span></th>';
        var tb = "";
        for (var ri = 0; ri < slice.length; ri++) {
          tb += "<tr>";
          for (var ci2 = 0; ci2 < cols.length; ci2++) {
            var v = slice[ri][cols[ci2]];
            tb +=
              v !== undefined && v !== ""
                ? '<td title="' + esc(v) + '">' + esc(v) + "</td>"
                : '<td class="nil">—</td>';
          }
          tb += "</tr>";
        }
        wrap.innerHTML =
          "<table><thead><tr>" +
          th +
          "</tr></thead><tbody>" +
          tb +
          "</tbody></table>";
        stats.innerHTML =
          "<b>" +
          gRows.length +
          "</b> Zeilen · <b>" +
          cols.length +
          "</b> Spalten" +
          (gRows.length > PLIMIT ? " · Vorschau: " + PLIMIT : "");
      }
      function doRmCol(e) {
        var p = e.getAttribute("data-path");
        gSelected.delete(p);
        el("ebtn").disabled = gSelected.size === 0;
        syncBtns();
        renderList();
        renderTable();
        stateSave();
      }

      /* EXPORT */
      function doExport() {
        if (!gSelected.size || !gRows.length) return;
        var cols = Array.from(gSelected),
          labels = cols.map(pathLabel),
          data = [labels];
        for (var ri = 0; ri < gRows.length; ri++) {
          var row = [];
          for (var ci = 0; ci < cols.length; ci++) {
            var v = gRows[ri][cols[ci]];
            row.push(v !== undefined ? v : "");
          }
          data.push(row);
        }
        var ws = XLSX.utils.aoa_to_sheet(data);
        var rng = XLSX.utils.decode_range(ws["!ref"]);
        for (var c = rng.s.c; c <= rng.e.c; c++) {
          var cell = ws[XLSX.utils.encode_cell({ r: 0, c: c })];
          if (cell)
            cell.s = {
              font: { bold: true, name: "Arial", sz: 10 },
              fill: { fgColor: { rgb: "DBEAFE" }, patternType: "solid" },
              alignment: { horizontal: "left" },
            };
        }
        ws["!cols"] = labels.map(function (lbl, ci) {
          var mx = lbl.length;
          for (var ri = 0; ri < gRows.length; ri++) {
            var v = gRows[ri][cols[ci]];
            if (v && v.length > mx) mx = v.length;
          }
          return { wch: Math.min(mx + 2, 50) };
        });
        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Extraktion");
        XLSX.writeFile(
          wb,
          (gFileName || "export") +
            "_" +
            new Date().toISOString().slice(0, 10) +
            ".xlsx",
        );
        showToast(gRows.length + " Zeilen exportiert");
      }

      /* UTILS */
      function el(id) {
        return document.getElementById(id);
      }
      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
      function pathLabel(path) {
        var m = path.match(/\[([^\]]+)\](?:\/([^\/]+))?$/);
        if (m) return m[2] ? m[1] + " / " + m[2] : m[1];
        return path.split("/").pop().replace("@", "");
      }
      function setFooter() {
        el("finfo").innerHTML =
          "<b>" +
          gRows.length +
          "</b> Datensätze · <b>" +
          gFields.length +
          "</b> Felder erkannt";
      }
      function setPg(pct, lbl) {
        el("pgwrap").classList.add("show");
        el("pgfill").style.width = pct + "%";
        el("pglbl").textContent = lbl;
      }
      function hidePg() {
        el("pgwrap").classList.remove("show");
      }
      var _tt;
      function showToast(msg, isErr) {
        var t = el("toast");
        t.textContent = msg;
        t.className = "toast show" + (isErr ? " err" : "");
        clearTimeout(_tt);
        _tt = setTimeout(function () {
          t.classList.remove("show");
        }, 3000);
      }
    </script>
  </body>
</html>
